  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAP Property Database — Greysteel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #081937;
      --navy-mid:    #0d2347;
      --navy-light:  #162f5e;
      --navy-faint:  #1a3570;
      --white:       #ffffff;
      --off-white:   #f4f6f9;
      --rule:        #dde3ee;
      --rule-dark:   #c4cde0;
      --text:        #0d1e3a;
      --text-mid:    #3d5070;
      --text-light:  #6b7fa0;
      --row-alt:     #f8fafd;
      --accent:      #ffffff;
      --hover-row:   #eef2fa;
      --copy-flash:  #dce8ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Franklin', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--off-white);
      -webkit-font-smoothing: antialiased;
    }

    /* ── White top stripe ── */
    .top-stripe { height: 4px; background: var(--white); }

    /* ── Header ── */
    header {
      background: var(--navy);
      padding: 0 28px;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--navy-faint);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .site-label {
      font-size: 10px; font-weight: 800;
      color: rgba(255,255,255,.5); letter-spacing: .2em;
      text-transform: uppercase;
    }
    .header-divider {
      width: 1px; height: 16px;
      background: rgba(255,255,255,.15);
    }
    header h1 {
      font-size: 17px; font-weight: 800;
      color: var(--white); letter-spacing: -.01em;
    }
    .export-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 32px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.25);
      background: transparent; color: rgba(255,255,255,.7);
      cursor: pointer; font-size: 11px; font-weight: 700;
      font-family: inherit; letter-spacing: .08em; text-transform: uppercase;
      transition: all .15s;
    }
    .export-btn:hover {
      border-color: var(--white); color: var(--white);
      background: rgba(255,255,255,.08);
    }

    /* ── Search bar ── */
    .search-bar {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--navy-faint);
      padding: 12px 28px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 9px; font-weight: 800; color: rgba(255,255,255,.4);
      text-transform: uppercase; letter-spacing: .15em;
    }
    .field-inner { position: relative; }
    .field-inner svg {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.25); pointer-events: none; transition: color .15s;
    }
    input[type="text"] {
      height: 34px; padding: 0 10px 0 30px;
      border: 1px solid rgba(255,255,255,.12); border-radius: 3px;
      font-size: 13px; font-family: inherit;
      color: var(--white);
      background: rgba(255,255,255,.07);
      transition: border-color .15s, background .15s;
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,.25); }
    input[type="text"]:focus {
      outline: none;
      border-color: rgba(255,255,255,.5);
      background: rgba(255,255,255,.12);
      box-shadow: 0 0 0 3px rgba(255,255,255,.06);
    }
    .field-inner:focus-within svg { color: rgba(255,255,255,.6); }

    .btn-reset {
      height: 34px; padding: 0 14px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.15);
      background: transparent; color: rgba(255,255,255,.45);
      cursor: pointer; font-size: 11px;
      font-family: inherit; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      transition: all .15s;
    }
    .btn-reset:hover { border-color: rgba(255,255,255,.4); color: rgba(255,255,255,.8); }

    /* ── Result line ── */
    .result-line {
      padding: 7px 28px;
      background: var(--navy);
      border-bottom: 3px solid var(--navy-light);
      display: flex; justify-content: space-between; align-items: center;
    }
    .result-line span {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,.4); letter-spacing: .02em;
    }
    .result-line strong { color: rgba(255,255,255,.85); font-weight: 700; }

    /* ── Table wrap ── */
    .table-wrap { padding: 20px 28px 40px; overflow-x: auto; }
    .table-wrap::-webkit-scrollbar { height: 5px; }
    .table-wrap::-webkit-scrollbar-track { background: var(--off-white); }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--rule-dark); border-radius: 3px; }
    .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--navy-light); }

    /* ── The table ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      background: var(--white);
      border-top: 3px solid var(--navy);
      border-bottom: 2px solid var(--navy);
      box-shadow: 0 1px 4px rgba(8,25,55,.08);
    }

    .data-table thead tr { background: var(--navy); }
    .data-table thead th {
      padding: 9px 11px;
      text-align: left;
      font-size: 10px; font-weight: 800;
      color: rgba(255,255,255,.55); letter-spacing: .1em; text-transform: uppercase;
      white-space: nowrap; cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--navy-faint);
      transition: color .15s, background .15s;
    }
    .data-table thead th:hover { color: var(--white); background: var(--navy-mid); }
    .data-table thead th.copy-col { cursor: default; width: 36px; min-width: 36px; }
    .data-table thead th.copy-col:hover { background: var(--navy); }

    /* Only horizontal rules */
    .data-table tbody tr {
      border-bottom: 1px solid var(--rule);
      transition: background .1s;
    }
    .data-table tbody tr:nth-child(even) { background: var(--row-alt); }
    .data-table tbody tr:hover { background: var(--hover-row) !important; }
    .data-table tbody tr:last-child { border-bottom: none; }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .data-table tbody tr.animate-in { animation: rowIn .16s ease-out both; }

    /* Copy sweep */
    @keyframes sweep {
      0%   { background-position: -100% 0; opacity: 1; }
      100% { background-position: 250% 0; opacity: 0; }
    }
    @keyframes rowPop {
      0%   { background-color: var(--copy-flash) !important; }
      100% { background-color: transparent !important; }
    }
    .data-table tbody tr.copied {
      animation: rowPop 1.3s ease-out forwards !important;
      position: relative;
    }
    .data-table tbody tr.copied::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(8,25,55,.12), transparent);
      background-size: 200% 100%;
      animation: sweep .6s ease-out forwards; z-index: 1;
    }

    .data-table td {
      padding: 7px 11px; white-space: nowrap;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis;
      color: var(--text); line-height: 1.3;
    }
    .data-table td.is-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; text-align: right; color: var(--text-mid);
    }

    /* Sticky copy col */
    .data-table td.copy-col,
    .data-table thead th.copy-col {
      position: sticky; left: 0; z-index: 2;
      background: var(--white);
      border-right: 1px solid var(--rule-dark);
      padding: 0 5px;
    }
    .data-table thead th.copy-col { background: var(--navy); z-index: 4; border-right: 1px solid var(--navy-faint); }
    .data-table tbody tr:nth-child(even) td.copy-col { background: var(--row-alt); }
    .data-table tbody tr:hover td.copy-col { background: var(--hover-row); }

    /* ── Copy button ── */
    .copy-btn {
      width: 28px; height: 28px; border-radius: 3px;
      border: 1px solid var(--rule-dark); background: transparent;
      cursor: pointer; color: var(--rule-dark);
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .copy-btn:hover {
      border-color: var(--navy); color: var(--navy);
      background: var(--hover-row);
    }
    .copy-btn:active { transform: scale(.88); }
    @keyframes checkPop {
      0% { transform: scale(.4); } 55% { transform: scale(1.25); } 100% { transform: scale(1); }
    }
    .copy-btn.success {
      border-color: var(--navy); background: var(--navy); color: var(--white);
    }
    .copy-btn.success svg { animation: checkPop .25s ease-out; }

    .particle { position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0); }
    }

    /* ── Skeleton ── */
    #loading { padding: 20px 28px 40px; }
    .skel-table {
      background: var(--white);
      border-top: 3px solid var(--navy);
      border-bottom: 2px solid var(--navy);
      box-shadow: 0 1px 4px rgba(8,25,55,.08);
    }
    .skel-head {
      background: var(--navy); height: 38px;
      display: flex; align-items: center; padding: 0 12px; gap: 10px;
    }
    .skel-row {
      display: flex; align-items: center; gap: 10px;

    }
    .skel-row:nth-child(even) { background: var(--row-alt); }
    .skel-row:last-child { border-bottom: none; }
    @keyframes shimmer {
      0%   { background-position: -700px 0; }
      100% { background-position: 700px 0; }
    }
    .skel {
      height: 10px; border-radius: 2px; flex-shrink: 0;
      background: linear-gradient(90deg, #eaeff6 25%, #dce3ef 50%, #eaeff6 75%);
      background-size: 700px 100%;
      animation: shimmer 1.3s ease-in-out infinite;
    }
    .skel.dark {
      background: linear-gradient(90deg, #0f2a52 25%, #162f5e 50%, #0f2a52 75%) !important;
      background-size: 700px 100% !important;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 3px;
      padding: 8px 28px 28px;
    }
    .pagination button {
      width: 34px; height: 34px; border-radius: 3px;

      cursor: pointer; font-size: 12px; font-weight: 700;

    }

    }
    .pagination button:disabled { opacity: .25; cursor: default; }
    .pagination button.active { background: var(--navy); border-color: var(--navy); color: var(--white); }
    .pagination .ellipsis { color: var(--text-light); padding: 0 4px; font-size: 13px; font-weight: 700; }
  </style>
</head>

function particles(btn){
  const r=btn.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  ["#081937","#162f5e","#0d2347","#ffffff","#c4cde0","#081937"].forEach((col,i)=>{

}

function query(count=false){
  let q=count?db.from(TABLE).select("id",{count:"exact",head:true}):db.from(TABLE).select("*");

  const co=document.getElementById("searchCounty").value.trim();
  const z=document.getElementById("searchZip").value.trim();
  const m=document.getElementById("searchMsa").value.trim();
  if(n) q=q.ilike("property_name",`%${n}%`);
  if(c) q=q.ilike("city",`%${c}%`);
  // Search both state and state_code columns
  if(st) q=q.or(`state.ilike.%${st}%,state_code.ilike.%${st}%`);
  if(co) q=q.ilike("county",`%${co}%`);
  if(z)  q=q.ilike("zip_code",`%${z}%`);
  if(m)  q=q.ilike("msa_name_text",`%${m}%`);
  return q;
}

    btn.onclick=()=>copy(i,btn,tr);ct.appendChild(btn);tr.appendChild(ct);

function copy(i,btn,tr){
  const r=rows[i];
  const t=COLS.map(c=>{const v=r[c.k];if(v==null)return"";const s=String(v);return(s.includes("\t")||s.includes("\n")||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s;}).join("\t");
  navigator.clipboard.writeText(t).then(()=>{
    btn.innerHTML=CK;btn.classList.add("success");particles(btn);
    tr.classList.remove("copied");void tr.offsetWidth;tr.classList.add("copied");
    setTimeout(()=>{btn.innerHTML=CI;btn.classList.remove("success");tr.classList.remove("copied");},2000);
  });
}

  const ws=XLSX.utils.json_to_sheet(d,{header:COLS.map(c=>c.l)});
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"HAP");
  XLSX.writeFile(wb,"hap_export.xlsx");
};

function paginate(){
  const tp=Math.ceil(total/PAGE_SIZE),bar=document.getElementById("paginationBar");
  if(tp<=1){bar.innerHTML="";return;}
  let h=`<button ${page===0?"disabled":""} onclick="go(${page-1})">&#8592;</button>`;
  const s=Math.max(0,page-2),e=Math.min(tp-1,page+2);
  if(s>0)h+=`<button onclick="go(0)">1</button>`;
  if(s>1)h+=`<span class="ellipsis">…</span>`;
  for(let p=s;p<=e;p++)h+=`<button class="${p===page?"active":""}" onclick="go(${p})">${p+1}</button>`;
  if(e<tp-2)h+=`<span class="ellipsis">…</span>`;
  if(e<tp-1)h+=`<button onclick="go(${tp-1})">${tp}</button>`;
  h+=`<button ${page>=tp-1?"disabled":""} onclick="go(${page+1})">&#8594;</button>`;
  bar.innerHTML=h;
}
function go(p){page=p;load();window.scrollTo({top:0,behavior:"smooth"});}

["searchName","searchCity","searchState","searchCounty","searchZip","searchMsa"].forEach(id=>{
  document.getElementById(id).addEventListener("input",()=>debounce(()=>{page=0;load();},400));
});
document.getElementById("resetBtn").onclick=()=>{
  ["searchName","searchCity","searchState","searchCounty","searchZip","searchMsa"].forEach(id=>document.getElementById(id).value="");
  page=0;load();
};
load();
</script>
