  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAP Property Database — Greysteel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #0B2545;
      --navy-mid:    #132f58;
      --navy-light:  #1e3f6f;
      --gold:        #C9A66B;
      --gold-light:  #e8d4a8;
      --gold-faint:  #f7f0e3;
      --cream:       #FAF7F2;
      --off-white:   #F4EDE0;
      --border:      #d6c9b0;
      --border-dark: #b8a882;
      --text:        #1A1A1A;
      --text-mid:    #3d3d3d;
      --text-light:  #6b6b6b;
      --white:       #ffffff;
      --row-alt:     #fdf9f4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', 'Calibri', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--cream);
    }

    /* ── Gold top stripe ── */
    .top-stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--gold) 0%, #e8c98a 50%, var(--gold) 100%);
    }

    /* ── Header ── */
    header {
      background: var(--navy);
      padding: 0 28px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 2px solid var(--gold);
    }
    .header-left { display: flex; align-items: center; gap: 18px; }

    /* Greysteel wordmark */
    .wordmark {
      display: flex; align-items: center; gap: 9px;
      border-right: 1px solid rgba(201,166,107,.35);
      padding-right: 18px;
    }
    .wordmark-icon {
      width: 28px; height: 28px; border-radius: 3px;
      background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .wordmark-text {
      font-family: 'Georgia', serif;
      font-size: 14px; font-weight: 700;
      color: var(--white); letter-spacing: .12em;
      text-transform: uppercase;
    }
    .wordmark-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px; font-weight: 600;
      color: var(--gold-light); letter-spacing: .18em;
      text-transform: uppercase; margin-top: 1px;
    }

    .header-title { display: flex; flex-direction: column; }
    header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 19px; font-weight: 800;
      color: var(--white); letter-spacing: .04em; text-transform: uppercase;
      line-height: 1;
    }
    .header-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 500;
      color: var(--gold-light); letter-spacing: .1em;
      text-transform: uppercase; margin-top: 2px;
    }

    .export-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px; height: 34px; border-radius: 2px;
      border: 1px solid var(--gold);
      background: transparent; color: var(--gold);
      cursor: pointer; font-size: 11px; font-weight: 700;
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: .1em; text-transform: uppercase;
      transition: all .18s;
    }
    .export-btn:hover {
      background: var(--gold); color: var(--navy);
    }

    /* ── Controls ── */
    .controls {
      background: var(--off-white);
      border-bottom: 2px solid var(--border-dark);
      padding: 11px 28px;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
    }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-group label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 700; color: var(--navy);
      text-transform: uppercase; letter-spacing: .1em;
    }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      color: var(--border-dark); pointer-events: none; transition: color .15s;
    }
    input[type="text"] {
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 5px 8px 5px 28px;
      font-size: 13px; font-family: 'Barlow', sans-serif;
      color: var(--text); height: 32px;
      background: var(--white);
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]::placeholder { color: #c2b49a; }
    input[type="text"]:focus {
      outline: none; border-color: var(--gold);
      box-shadow: 0 0 0 2px rgba(201,166,107,.2);
    }
    .input-wrap:focus-within svg { color: var(--gold); }

    .reset-btn {
      height: 32px; padding: 0 14px; border-radius: 2px;
      border: 1px solid var(--border); background: var(--white);
      color: var(--text-light); cursor: pointer;
      font-size: 11px; font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      transition: all .15s;
    }
    .reset-btn:hover { border-color: var(--navy); color: var(--navy); }

    /* ── Status bar ── */
    .status-bar {
      padding: 6px 28px;
      background: var(--navy);
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--navy-mid);
    }
    .result-count {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,.55);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .result-count strong { color: var(--gold); }
    .page-info {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; color: rgba(255,255,255,.4);
      text-transform: uppercase; letter-spacing: .06em;
    }

    /* ── Table wrap ── */
    .table-wrap { overflow-x: auto; padding: 18px 28px 36px; }
    .table-wrap::-webkit-scrollbar { height: 6px; }
    .table-wrap::-webkit-scrollbar-track { background: var(--off-white); }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    table {
      border-collapse: collapse;
      font-size: 12px;
      background: var(--white);
      border: 2px solid var(--navy);
    }

    thead tr { background: var(--navy); }
    thead th {
      padding: 8px 10px; text-align: left;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 10.5px;

    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:hover { background: var(--gold-faint) !important; }

    /* Row entrance */
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    tbody tr.animate-in { animation: rowIn .18s ease-out both; }

    /* Copy sweep */
    @keyframes beamSweep {
      0%   { background-position: -100% 0; opacity: 1; }
      100% { background-position: 250% 0; opacity: 0; }
    }
    @keyframes rowGlow {
      0%   { background-color: #f0e8d0 !important; }
      100% { background-color: transparent !important; }

      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(90deg, transparent 0%, rgba(201,166,107,.35) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: beamSweep .65s ease-out forwards; z-index: 1;

    td {
      padding: 6px 10px; white-space: nowrap;
      border-right: 1px solid var(--border);
      max-width: 190px; overflow: hidden; text-overflow: ellipsis;

      position: sticky; left: 0; z-index: 2;
      background: var(--white);
      border-right: 2px solid var(--border-dark) !important;
      padding: 0 5px;
    }
    thead th.copy-col { background: var(--navy); z-index: 4; border-right: 2px solid var(--navy-light) !important; }
    tbody tr:nth-child(even) td.copy-col { background: var(--row-alt); }
    tbody tr:hover td.copy-col { background: var(--gold-faint); }

    /* ── Copy button ── */
    .copy-btn {
      width: 28px; height: 28px; border-radius: 2px;
      border: 1px solid var(--border);
      background: var(--white);
      cursor: pointer; color: #c2b49a;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .copy-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-faint); }
    .copy-btn:active { transform: scale(.9); }

    @keyframes checkPop {
      0% { transform: scale(.5); } 60% { transform: scale(1.2); } 100% { transform: scale(1); }

    .copy-btn.success { border-color: var(--gold); color: var(--navy); background: var(--gold-light); }

    /* Particles */
    .particle { position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }

    /* ── Skeleton ── */
    #loading { padding: 18px 28px 36px; }

    }

    .pagination .ellipsis { color: var(--text-light); padding: 0 4px; font-family: 'Barlow Condensed', sans-serif; }

function fmtDate(v) { if(!v) return ""; const d=new Date(v); return isNaN(d)?v:d.toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}); }
function debounce(fn,ms){ clearTimeout(debounceTimer); debounceTimer=setTimeout(fn,ms); }

function spawnParticles(btn) {
  const r=btn.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  const colors=["#C9A66B","#e8c98a","#0B2545","#1e3f6f","#E5D4A8","#5B6B7E"];
  for(let i=0;i<8;i++){
    const p=document.createElement("div"); p.className="particle";
    const a=(Math.PI*2*i)/8, d=20+Math.random()*20;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${3+Math.random()*3}px;height:${3+Math.random()*3}px;background:${colors[i%colors.length]};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d-8}px;animation:particleFly ${.4+Math.random()*.2}s ease-out forwards;animation-delay:${Math.random()*.05}s;`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),700);
  }
}

function buildQuery(forCount=false) {
  let q = forCount ? db.from(TABLE).select("id",{count:"exact",head:true}) : db.from(TABLE).select("*");
  const name=document.getElementById("searchName").value.trim();
  const city=document.getElementById("searchCity").value.trim();
  const county=document.getElementById("searchCounty").value.trim();
  const zip=document.getElementById("searchZip").value.trim();
  const msa=document.getElementById("searchMsa").value.trim();
  if(name)   q=q.ilike("property_name",`%${name}%`);
  if(city)   q=q.ilike("city",`%${city}%`);
  if(county) q=q.ilike("county",`%${county}%`);
  if(zip)    q=q.ilike("zip_code",`%${zip}%`);
  if(msa)    q=q.ilike("msa_name_text",`%${msa}%`);
  return q;
}

  document.getElementById("resultCount").innerHTML=`<strong>${totalCount.toLocaleString()}</strong> properties found`;
  document.getElementById("pageInfo").textContent=`Page ${currentPage+1} of ${Math.ceil(totalCount/PAGE_SIZE)||1}`;
  document.getElementById("loading").style.display="none";
  document.getElementById("mainTable").style.display="table";
}

const COPY_ICON=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHECK_ICON=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function renderTable(rows) {
  const tbody=document.getElementById("tableBody"); tbody.innerHTML="";
  if(!rows.length){
    const tr=document.createElement("tr"),td=document.createElement("td");
    td.colSpan=COLUMNS.length+1;
    td.style.cssText="padding:36px;text-align:center;color:var(--text-light);font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;";
    td.textContent="No results found."; tr.appendChild(td); tbody.appendChild(tr); return;
  }
  rows.forEach((r,i)=>{
    const tr=document.createElement("tr"); tr.className="animate-in"; tr.style.animationDelay=(i*.016)+"s";
    const ctd=document.createElement("td"); ctd.className="copy-col";
    const btn=document.createElement("button"); btn.className="copy-btn"; btn.innerHTML=COPY_ICON; btn.title="Copy row";
    btn.onclick=()=>copyRow(i,btn,tr); ctd.appendChild(btn); tr.appendChild(ctd);
    COLUMNS.forEach(col=>{
      const td=document.createElement("td");
      let val=r[col.key]; if(val==null) val="";
      if(col.key.includes("date")&&val) val=fmtDate(val);
      if(NUM_KEYS.has(col.key)) td.className="is-num";
      td.textContent=val; td.title=String(val); tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function copyRow(idx,btn,tr) {
  const r=currentRows[idx];
  const tsv=COLUMNS.map(col=>{const v=r[col.key];if(v==null)return"";const s=String(v);return(s.includes("\t")||s.includes("\n")||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s;}).join("\t");
  navigator.clipboard.writeText(tsv).then(()=>{
    btn.innerHTML=CHECK_ICON; btn.classList.add("success"); spawnParticles(btn);
    tr.classList.remove("copied"); void tr.offsetWidth; tr.classList.add("copied");
    setTimeout(()=>{btn.innerHTML=COPY_ICON;btn.classList.remove("success");tr.classList.remove("copied");},2000);
  });
}

document.getElementById("exportBtn").onclick=()=>{
  if(!currentRows.length) return;
  const d=currentRows.map(r=>Object.fromEntries(COLUMNS.map(c=>[c.label,r[c.key]??""])));
  const ws=XLSX.utils.json_to_sheet(d,{header:COLUMNS.map(c=>c.label)});
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"HAP Properties");
  XLSX.writeFile(wb,"hap_export.xlsx");
};

function renderPagination() {
  const tp=Math.ceil(totalCount/PAGE_SIZE), bar=document.getElementById("paginationBar");
  if(tp<=1){bar.innerHTML="";return;}
  let h=`<button ${currentPage===0?"disabled":""} onclick="goPage(${currentPage-1})">&#8592;</button>`;
  const s=Math.max(0,currentPage-2),e=Math.min(tp-1,currentPage+2);
  if(s>0) h+=`<button onclick="goPage(0)">1</button>`;
  if(s>1) h+=`<span class="ellipsis">…</span>`;
  for(let p=s;p<=e;p++) h+=`<button class="${p===currentPage?"active":""}" onclick="goPage(${p})">${p+1}</button>`;
  if(e<tp-2) h+=`<span class="ellipsis">…</span>`;
  if(e<tp-1) h+=`<button onclick="goPage(${tp-1})">${tp}</button>`;
  h+=`<button ${currentPage>=tp-1?"disabled":""} onclick="goPage(${currentPage+1})">&#8594;</button>`;
  bar.innerHTML=h;
}
function goPage(p){currentPage=p;loadData();window.scrollTo({top:0,behavior:"smooth"});}

["searchName","searchCity","searchCounty","searchZip","searchMsa"].forEach(id=>{
  document.getElementById(id).addEventListener("input",()=>{debounce(()=>{currentPage=0;loadData();},400);});
});
document.getElementById("resetBtn").onclick=()=>{
  ["searchName","searchCity","searchCounty","searchZip","searchMsa"].forEach(id=>{document.getElementById(id).value="";});
  currentPage=0;loadData();
};

loadData();
</script>
</body>
