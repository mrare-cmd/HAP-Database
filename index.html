    :root {
      --blue:        #1a73e8;
      --blue-light:  #e8f0fe;
      --blue-hover:  #1557b0;
      --gray-bg:     #f8f9fa;
      --gray-border: #dadce0;
      --gray-text:   #5f6368;
      --text:        #202124;
      --white:       #ffffff;
      --green:       #1e8e3e;
      --green-light: #e6f4ea;
      --shadow-sm:   0 1px 3px rgba(60,64,67,.15), 0 1px 2px rgba(60,64,67,.1);
      --shadow-md:   0 2px 6px rgba(60,64,67,.15), 0 1px 4px rgba(60,64,67,.1);
      --shadow-lg:   0 4px 12px rgba(60,64,67,.15), 0 2px 6px rgba(60,64,67,.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--gray-bg);
    }

    /* ── Header ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-border);
      padding: 0 24px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--blue); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    header h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 18px; font-weight: 500; color: var(--text); letter-spacing: -.01em;
    }
    header p { font-size: 12px; color: var(--gray-text); margin-top: 1px; }

    .export-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px; height: 36px; border-radius: 4px;
      border: 1px solid var(--gray-border);
      background: var(--white); color: var(--blue);
      cursor: pointer; font-size: 13px; font-weight: 500;
      font-family: 'Google Sans', sans-serif;
      transition: background .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .export-btn:hover { background: var(--blue-light); box-shadow: var(--shadow-sm); border-color: var(--blue-light); }

    /* ── Controls ── */
    .controls {
      background: var(--white);
      border-bottom: 1px solid var(--gray-border);
      padding: 12px 24px;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
    }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-group label {
      font-size: 11px; font-weight: 500; color: var(--gray-text);
      letter-spacing: .03em;
    }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: #9aa0a6; pointer-events: none; transition: color .15s;
    }
    input[type="text"] {
      border: 1px solid var(--gray-border); border-radius: 4px;
      padding: 7px 10px 7px 32px;
      font-size: 13px; font-family: 'Roboto', sans-serif;
      color: var(--text); height: 36px; width: 170px;
      background: var(--white);
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]::placeholder { color: #9aa0a6; }
    input[type="text"]:focus {
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(26,115,232,.2);
    }
    input[type="text"]:focus ~ svg { color: var(--blue); }
    .input-wrap:focus-within svg { color: var(--blue); }

    .reset-btn {
      height: 36px; padding: 0 14px; border-radius: 4px;
      border: 1px solid var(--gray-border); background: var(--white);
      color: var(--gray-text); cursor: pointer;
      font-size: 13px; font-family: 'Roboto', sans-serif; font-weight: 500;
      transition: background .15s;
    }
    .reset-btn:hover { background: var(--gray-bg); }

    /* ── Status bar ── */
    .status-bar {
      padding: 8px 24px; font-size: 12px; color: var(--gray-text);
      display: flex; justify-content: space-between; align-items: center;
    }

    /* ── Table wrap ── */
    .table-wrap { overflow-x: auto; padding: 0 24px 32px; }
    .table-wrap::-webkit-scrollbar { height: 8px; }
    .table-wrap::-webkit-scrollbar-track { background: var(--gray-bg); }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--gray-border); border-radius: 4px; }
    .table-wrap::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }

    table {
      border-collapse: separate; border-spacing: 0;
      margin-top: 12px; font-size: 13px;
      background: var(--white);
      border: 1px solid var(--gray-border);
      border-radius: 8px; overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    thead tr { background: var(--gray-bg); }
    thead th {
      padding: 10px 12px; text-align: left;
      font-family: 'Google Sans', sans-serif;
      font-weight: 500; font-size: 11px;
      color: var(--gray-text); letter-spacing: .04em; text-transform: uppercase;
      white-space: nowrap; cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--gray-border);
      border-right: 1px solid var(--gray-border);
      transition: background .15s, color .15s;
    }
    thead th:hover { background: #ecf0fb; color: var(--blue); }
    thead th.copy-col { cursor: default; width: 44px; min-width: 44px; }
    thead th.copy-col:hover { background: var(--gray-bg); color: var(--gray-text); }

    tbody tr { border-bottom: 1px solid #f1f3f4; transition: background .1s; }
    tbody tr:hover { background: #f8f9ff; }
    tbody tr:last-child { border-bottom: none; }

    /* Row entrance */
    @keyframes rowFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    tbody tr.animate-in { animation: rowFadeIn .22s ease-out both; }

    /* Copy beam sweep */
    @keyframes beamSweep {
      0%   { background-position: -100% 0; opacity: 1; }
      100% { background-position: 250% 0;  opacity: 0; }
    }
    @keyframes rowGlow {
      0%   { background-color: #e6f4ea; }
      100% { background-color: transparent; }
    }
    tbody tr.copied {
      animation: rowGlow 1.3s ease-out forwards !important;
      position: relative;
    }
    tbody tr.copied::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(90deg, transparent 0%, rgba(30,142,62,.18) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: beamSweep .65s ease-out forwards;
      z-index: 1;
    }

    td {
      padding: 8px 12px; white-space: nowrap;
      border-right: 1px solid #f1f3f4;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    td:last-child { border-right: none; }

    td.copy-col, thead th.copy-col {
      position: sticky; left: 0; z-index: 2;
      background: var(--white);
      border-right: 1px solid var(--gray-border) !important;
      padding: 0 6px;
    }
    thead th.copy-col { background: var(--gray-bg); z-index: 4; }
    tbody tr:hover td.copy-col { background: #f8f9ff; }
    tbody tr.copied td.copy-col { background: #e6f4ea; }

    /* ── Copy button ── */
    .copy-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: transparent;
      cursor: pointer; color: #9aa0a6;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .copy-btn:hover { background: var(--blue-light); color: var(--blue); }
    .copy-btn:active { transform: scale(.92); }

    @keyframes checkPop {
      0%   { transform: scale(.6); opacity: 0; }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .copy-btn.success {
      background: var(--green-light); color: var(--green);
    }
    .copy-btn.success svg { animation: checkPop .25s ease-out; }

    /* ── Particles ── */
    .particle {
      position: fixed; pointer-events: none; z-index: 9999;
      border-radius: 50%; background: var(--green);
    }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
    }

    /* ── Loading skeleton ── */
    #loading { padding: 12px 24px 32px; }
    .skeleton-wrap {
      background: var(--white); border: 1px solid var(--gray-border);
      border-radius: 8px; overflow: hidden;
      box-shadow: var(--shadow-sm); margin-top: 12px;
    }
    .skeleton-header {
      height: 40px; background: var(--gray-bg);
      border-bottom: 1px solid var(--gray-border);
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
    }
    .skeleton-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid #f1f3f4;
    }
    .skeleton-row:last-child { border-bottom: none; }

    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skel {
      height: 11px; border-radius: 6px; flex-shrink: 0;
      background: linear-gradient(90deg, #f1f3f4 25%, #e8eaed 50%, #f1f3f4 75%);
      background-size: 600px 100%;
      animation: shimmer 1.3s ease-in-out infinite;
    }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 24px 24px; justify-content: center;
    }
    .pagination button {
      border: none; background: transparent;
      border-radius: 50%; width: 36px; height: 36px;
      cursor: pointer; font-size: 13px;
      font-family: 'Roboto', sans-serif; font-weight: 500;
      color: var(--gray-text); transition: background .15s;
    }
    .pagination button:hover:not(:disabled) { background: var(--gray-bg); }
    .pagination button:disabled { opacity: .3; cursor: default; }
    .pagination button.active { background: var(--blue); color: var(--white); }
    .pagination .pg-arrow { font-size: 16px; color: var(--gray-text); }
    .pagination .ellipsis { color: var(--gray-text); padding: 0 4px; line-height: 36px; }
  </style>
</head>

  { key: "mgmt_agent_indv_first_name",  label: "mgmt_agent_indv_first_name" },
  { key: "mgmt_agent_indv_last_name",   label: "mgmt_agent_indv_last_name" },
  { key: "mgmt_agent_indv_middle_name", label: "mgmt_agent_indv_middle_name" },
  { key: "mgmt_agent_full_name",        label: "mgmt_agent_full_name" },
  { key: "mgmt_agent_indv_title_text",  label: "mgmt_agent_indv_title_text" },
  { key: "mgmt_agent_org_name",         label: "mgmt_agent_org_name" },
  { key: "mgmt_agent_address_line1",    label: "mgmt_agent_address_line1" },
  { key: "mgmt_agent_address_line2",    label: "mgmt_agent_address_line2" },
  { key: "mgmt_agent_city_name",        label: "mgmt_agent_city_name" },
  { key: "mgmt_agent_state_code",       label: "mgmt_agent_state_code" },
  { key: "mgmt_agent_zip_code",         label: "mgmt_agent_zip_code" },
  { key: "mgmt_agent_zip4_code",        label: "mgmt_agent_zip4_code" },
  { key: "mgmt_agent_main_phone_number",label: "mgmt_agent_main_phone_number" },
  { key: "mgmt_agent_main_fax_number",  label: "mgmt_agent_main_fax_number" },
  { key: "mgmt_contact_email_text",     label: "mgmt_contact_email_text" },
];

// Build header
(function() {
  const tr = document.createElement("tr");
  const copyTh = document.createElement("th");
  copyTh.className = "copy-col";
  tr.appendChild(copyTh);
  COLUMNS.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col.label;
    th.dataset.col = col.key;
    th.addEventListener("click", () => {
      sortAsc = sortCol === col.key ? !sortAsc : true;
      sortCol = col.key; currentPage = 0; loadData();
    });
    tr.appendChild(th);
  });
  document.getElementById("tableHead").appendChild(tr);
})();

function fmtDate(val) {
  if (!val) return "";
  const d = new Date(val);
  return isNaN(d) ? val : d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

function debounce(fn, ms) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fn, ms);
}

function spawnParticles(btn) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ["#1e8e3e","#34a853","#81c995","#1a73e8","#4285f4","#fbbc04"];
  for (let i = 0; i < 8; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const angle = (Math.PI * 2 * i) / 8;
    const dist  = 22 + Math.random() * 22;
    p.style.cssText = `
      left:${cx}px; top:${cy}px; width:${3+Math.random()*3}px; height:${3+Math.random()*3}px;
      background:${colors[i % colors.length]};
      --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist - 8}px;
      animation: particleFly ${.45+Math.random()*.25}s ease-out forwards;
      animation-delay:${Math.random()*.06}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

function buildQuery(forCount = false) {
  let q = forCount
    ? db.from(TABLE).select("id", { count: "exact", head: true })
    : db.from(TABLE).select("*");
  const name   = document.getElementById("searchName").value.trim();
  const city   = document.getElementById("searchCity").value.trim();
  const county = document.getElementById("searchCounty").value.trim();
  const zip    = document.getElementById("searchZip").value.trim();
  const msa    = document.getElementById("searchMsa").value.trim();
  if (name)   q = q.ilike("property_name", `%${name}%`);
  if (city)   q = q.ilike("city",          `%${city}%`);
  if (county) q = q.ilike("county",        `%${county}%`);
  if (zip)    q = q.ilike("zip_code",      `%${zip}%`);
  if (msa)    q = q.ilike("msa_name_text", `%${msa}%`);
  return q;
}

async function loadData() {
  document.getElementById("loading").style.display = "block";
  document.getElementById("mainTable").style.display = "none";
  document.getElementById("paginationBar").innerHTML = "";

  const { count } = await buildQuery(true);
  totalCount = count || 0;

  const from = currentPage * PAGE_SIZE;
  const { data, error } = await buildQuery()
    .order(sortCol, { ascending: sortAsc })
    .range(from, from + PAGE_SIZE - 1);

  if (error) {
    document.getElementById("loading").innerHTML = `<p style="padding:24px;color:#d93025">Error: ${error.message}</p>`;
    return;
  }

  currentRows = data || [];
  renderTable(currentRows);
  renderPagination();

  document.getElementById("resultCount").textContent =
    `About ${totalCount.toLocaleString()} results`;
  document.getElementById("pageInfo").textContent =
    `Page ${currentPage + 1} of ${Math.ceil(totalCount / PAGE_SIZE) || 1}`;
  document.getElementById("loading").style.display = "none";
  document.getElementById("mainTable").style.display = "table";
}

const COPY_ICON  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHECK_ICON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function renderTable(rows) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  if (!rows.length) {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = COLUMNS.length + 1;
    td.style.cssText = "padding:40px;text-align:center;color:#5f6368;";
    td.textContent = "No results found.";
    tr.appendChild(td); tbody.appendChild(tr);
    return;
  }
  rows.forEach((r, i) => {
    const tr = document.createElement("tr");
    tr.className = "animate-in";
    tr.style.animationDelay = (i * .02) + "s";

    const copyTd = document.createElement("td");
    copyTd.className = "copy-col";
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.innerHTML = COPY_ICON;
    btn.title = "Copy row";
    btn.onclick = () => copyRow(i, btn, tr);
    copyTd.appendChild(btn);
    tr.appendChild(copyTd);

    COLUMNS.forEach(col => {
      const td = document.createElement("td");
      let val = r[col.key];
      if (val == null) val = "";
      if (col.key.includes("date") && val) val = fmtDate(val);
      td.textContent = val;
      td.title = String(val);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

function copyRow(idx, btn, tr) {
  const r = currentRows[idx];
  const tsv = COLUMNS.map(col => {
    const val = r[col.key];
    if (val == null) return "";
    const str = String(val);
    return (str.includes("\t") || str.includes("\n") || str.includes('"'))
      ? '"' + str.replace(/"/g, '""') + '"' : str;
  }).join("\t");

  navigator.clipboard.writeText(tsv).then(() => {
    btn.innerHTML = CHECK_ICON;
    btn.classList.add("success");
    spawnParticles(btn);
    tr.classList.remove("copied");
    void tr.offsetWidth;
    tr.classList.add("copied");
    setTimeout(() => {
      btn.innerHTML = COPY_ICON;
      btn.classList.remove("success");
      tr.classList.remove("copied");
    }, 2000);
  });
}

document.getElementById("exportBtn").onclick = () => {
  if (!currentRows.length) return;
  const exportData = currentRows.map(r =>
    Object.fromEntries(COLUMNS.map(col => [col.label, r[col.key] ?? ""]))
  );
  const ws = XLSX.utils.json_to_sheet(exportData, { header: COLUMNS.map(c => c.label) });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "HAP Properties");
  XLSX.writeFile(wb, "hap_export.xlsx");
};

function renderPagination() {
  const totalPages = Math.ceil(totalCount / PAGE_SIZE);
  const bar = document.getElementById("paginationBar");
  if (totalPages <= 1) { bar.innerHTML = ""; return; }
  let html = `<button class="pg-arrow" ${currentPage===0?"disabled":""} onclick="goPage(${currentPage-1})">&#8592;</button>`;
  const start = Math.max(0, currentPage - 2);
  const end   = Math.min(totalPages - 1, currentPage + 2);
  if (start > 0) html += `<button onclick="goPage(0)">1</button>`;
  if (start > 1) html += `<span class="ellipsis">…</span>`;
  for (let p = start; p <= end; p++)
    html += `<button class="${p===currentPage?"active":""}" onclick="goPage(${p})">${p+1}</button>`;
  if (end < totalPages - 2) html += `<span class="ellipsis">…</span>`;
  if (end < totalPages - 1) html += `<button onclick="goPage(${totalPages-1})">${totalPages}</button>`;
  html += `<button class="pg-arrow" ${currentPage>=totalPages-1?"disabled":""} onclick="goPage(${currentPage+1})">&#8594;</button>`;
  bar.innerHTML = html;
}

function goPage(p) { currentPage = p; loadData(); window.scrollTo({ top: 0, behavior: "smooth" }); }

["searchName","searchCity","searchCounty","searchZip","searchMsa"].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    debounce(() => { currentPage = 0; loadData(); }, 400);
  });
});

document.getElementById("resetBtn").onclick = () => {
  ["searchName","searchCity","searchCounty","searchZip","searchMsa"].forEach(id => {
    document.getElementById(id).value = "";
  });
  currentPage = 0; loadData();
};

loadData();
</script>
