  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAP Property Database — Greysteel</title>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #081937;
      --navy-mid:    #0d2347;
      --navy-light:  #162f5e;
      --navy-faint:  #1a3570;
      --white:       #ffffff;
      --off-white:   #f4f6f9;
      --rule:        #dde3ee;
      --rule-dark:   #c4cde0;
      --text:        #0d1e3a;
      --text-mid:    #3d5070;
      --text-light:  #6b7fa0;
      --row-alt:     #f8fafd;
      --hover-row:   #eef2fa;
      --copy-flash:  #dce8ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Franklin', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--off-white);
      -webkit-font-smoothing: antialiased;
    }

    .top-stripe { height: 4px; background: var(--white); }

    header {
      background: var(--navy);
      padding: 0 28px;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--navy-faint);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .site-label {
      font-size: 10px; font-weight: 800;
      color: rgba(255,255,255,.5); letter-spacing: .2em;
      text-transform: uppercase;
    }
    .header-divider { width: 1px; height: 16px; background: rgba(255,255,255,.15); }
    header h1 { font-size: 17px; font-weight: 800; color: var(--white); letter-spacing: -.01em; }
    .asof-label {
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,.35);
      letter-spacing: .12em; text-transform: uppercase;
    }
    .asof-label strong { color: rgba(255,255,255,.75); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .hdr-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 32px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.25);
      background: transparent; color: rgba(255,255,255,.7);
      cursor: pointer; font-size: 11px; font-weight: 700;
      font-family: inherit; letter-spacing: .08em; text-transform: uppercase;
      transition: all .15s;
    }
    .hdr-btn:hover { border-color: var(--white); color: var(--white); background: rgba(255,255,255,.08); }
    .hdr-btn:disabled { opacity: .45; cursor: progress; }
    .hdr-btn.update { border-color: rgba(126,224,165,.5); color: #7ee0a5; }
    .hdr-btn.update:hover { border-color: #7ee0a5; color: #b6f0cd; background: rgba(28,122,63,.25); }

    .search-bar {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--navy-faint);
      padding: 12px 28px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 9px; font-weight: 800; color: rgba(255,255,255,.4);
      text-transform: uppercase; letter-spacing: .15em;
    }
    .field-inner { position: relative; }
    .field-inner svg {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.25); pointer-events: none; transition: color .15s;
    }
    input[type="text"] {
      height: 34px; padding: 0 10px 0 30px;
      border: 1px solid rgba(255,255,255,.12); border-radius: 3px;
      font-size: 13px; font-family: inherit;
      color: var(--white);
      background: rgba(255,255,255,.07);
      transition: border-color .15s, background .15s;
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,.25); }
    input[type="text"]:focus {
      outline: none;
      border-color: rgba(255,255,255,.5);
      background: rgba(255,255,255,.12);
      box-shadow: 0 0 0 3px rgba(255,255,255,.06);
    }
    .field-inner:focus-within svg { color: rgba(255,255,255,.6); }

    .btn-reset {
      height: 34px; padding: 0 14px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.15);
      background: transparent; color: rgba(255,255,255,.45);
      cursor: pointer; font-size: 11px;
      font-family: inherit; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      transition: all .15s;
    }
    .btn-reset:hover { border-color: rgba(255,255,255,.4); color: rgba(255,255,255,.8); }

    .result-line {
      padding: 7px 28px;
      background: var(--navy);
      border-bottom: 3px solid var(--navy-light);
      display: flex; justify-content: space-between; align-items: center;
    }
    .result-line span {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,.4); letter-spacing: .02em;
    }
    .result-line strong { color: rgba(255,255,255,.85); font-weight: 700; }
    .rl-right { display: flex; align-items: center; gap: 16px; }
    .rows-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 800; color: rgba(255,255,255,.4);
      letter-spacing: .12em; text-transform: uppercase;
    }
    .rows-label select {
      height: 22px; padding: 0 4px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.25);
      background: var(--navy-mid); color: rgba(255,255,255,.85);
      font-family: inherit; font-size: 11px; font-weight: 700;
      cursor: pointer; outline: none;
    }
    .rows-label select:hover { border-color: rgba(255,255,255,.55); }

    #statusStrip {
      display: none;
      padding: 8px 28px;
      background: var(--navy-light);
      border-bottom: 1px solid var(--navy-faint);
      font-size: 12px; font-weight: 600;
      color: #dff0ff; letter-spacing: .02em;
    }

    /* ── Stat strip ── */
    .stat-strip {
      display: flex; align-items: stretch; gap: 0;
      background: var(--white);
      border-bottom: 1px solid var(--rule);
      padding: 0 28px;
    }
    .stat-card {
      display: flex; flex-direction: row; align-items: baseline; gap: 7px;
      padding: 6px 18px 6px 0; margin-right: 18px;
      border-right: 1px solid var(--rule);
    }
    .stat-card:last-child { border-right: none; }
    .stat-card .stat-label {
      font-size: 8px; font-weight: 800; color: var(--text-light);
      letter-spacing: .14em; text-transform: uppercase;
    }
    .stat-card .stat-value {
      font-size: 13px; font-weight: 800; color: var(--navy);
      letter-spacing: -.01em; font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .multi-badge {
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: 6px; padding: 1px 5px; vertical-align: 1px;
      border: 1px solid var(--rule-dark); border-radius: 8px;
      background: transparent; color: var(--text-light);
      font-size: 9px; font-weight: 800; letter-spacing: .04em;
      cursor: pointer; font-family: inherit; line-height: 1.4;
      transition: all .15s;
    }
    .multi-badge:hover { border-color: var(--navy); color: var(--navy); background: var(--hover-row); }

    /* ── Multi-tier rent flag + popup ── */
    .tier-flag {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; margin-left: 6px; vertical-align: -4px;
      border: none; border-radius: 3px; background: transparent;
      color: #e08a3c; cursor: pointer; padding: 0;
      transition: all .15s;
    }
    .tier-flag:hover { background: #fdeedd; color: #c9721f; transform: scale(1.12); }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(8,25,55,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(8px) scale(.98); }
                         to   { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-card {
      background: var(--white); border-radius: 4px; border-top: 3px solid var(--navy);
      box-shadow: 0 18px 50px rgba(8,25,55,.35);
      width: 100%; max-width: 620px; max-height: 80vh;
      display: flex; flex-direction: column;
      animation: modalIn .18s ease-out;
    }
    .modal-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; padding: 16px 20px 12px;
      border-bottom: 2px solid var(--navy);
    }
    .modal-head .mh-title { font-size: 15px; font-weight: 800; color: var(--navy); letter-spacing: -.01em; }
    .modal-head .mh-sub {
      font-size: 10px; font-weight: 700; color: var(--text-light);
      letter-spacing: .12em; text-transform: uppercase; margin-top: 3px;
    }
    .modal-close {
      width: 28px; height: 28px; flex-shrink: 0; border-radius: 3px;
      border: 1px solid var(--rule-dark); background: transparent;
      color: var(--text-mid); cursor: pointer; font-size: 14px; line-height: 1;
      font-family: inherit; transition: all .15s;
    }
    .modal-close:hover { border-color: var(--navy); color: var(--navy); background: var(--hover-row); }
    .modal-body { overflow-y: auto; padding: 0 20px 20px; }
    .tier-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 14px; }
    .tier-table th {
      text-align: left; padding: 7px 10px;
      font-size: 9px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,.65); background: var(--navy);
    }
    .tier-table td {
      padding: 7px 10px; border-bottom: 1px solid var(--rule); color: var(--text);
    }
    .tier-table td.tn { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; text-align: right; color: var(--text-mid); }
    .tier-table tr:nth-child(even) td { background: var(--row-alt); }
    .tier-table td.br-lead { font-weight: 700; color: var(--navy); }
    .tier-note {
      margin-top: 12px; font-size: 11px; color: var(--text-light); line-height: 1.5;
    }

    /* ── Empty state ── */
    .empty-state {
      padding: 64px 20px; text-align: center;
    }
    .empty-state svg { color: var(--rule-dark); margin-bottom: 14px; }
    .empty-state .es-title {
      font-size: 14px; font-weight: 800; color: var(--text-mid);
      letter-spacing: .02em; margin-bottom: 4px;
    }
    .empty-state .es-sub {
      font-size: 12px; color: var(--text-light); margin-bottom: 18px;
    }
    .empty-state button {
      padding: 9px 20px; border-radius: 3px;
      border: 1px solid var(--navy); background: var(--white);
      color: var(--navy); cursor: pointer;
      font-family: inherit; font-size: 11px; font-weight: 800;
      letter-spacing: .1em; text-transform: uppercase;
      transition: all .15s;
    }
    .empty-state button:hover { background: var(--navy); color: var(--white); }

    .table-wrap { padding: 20px 28px 40px; overflow-x: auto; }

  for(let i=0;i<16;i++){
    const r=document.createElement("div");r.className="skel-row";
    [26,108,50,38,70,38,148,86,68,80,80,50,40,40,40,76,76].forEach((x,j)=>{
      const s=document.createElement("div");s.className="skel";
      s.style.width=(x+Math.random()*16-8)+"px";
      s.style.animationDelay=(i*.03+j*.007)+"s";

/* ── Data state ────────────────────────────────────────────────────
   Everything comes from hap_state.json, produced by the UNCHANGED
   HAP pipeline (hap_pipeline.py) running inside the GitHub Action. */
let C=[], T=[], R=[], ASOF="";
let TIERS={};      // contract -> [[bed, units, rent, fmr, ua], ...] for multi-tier contracts
let PROP_N={};     // property id -> number of contract rows in the master
let view=[];
let page=0, sortCol=0, sortAsc=true, timer=null;

let IDX={};
const FILTER_MAP=[
  {input:"searchName",  cols:["Property Name"]},
  {input:"searchCity",  cols:["City"]},
  {input:"searchState", cols:["State","state_code"]},
  {input:"searchCounty",cols:["County"]},
  {input:"searchZip",   cols:["zip_code"]},
  {input:"searchMsa",   cols:["msa_name_text"]},
];
const RATIO="Rent-to-FMR Ratio";
const INTC=new Set(["Total Units","Contract Units","property_total_unit_count",
  "0BR Units","1BR Units","2BR Units","3BR Units","4BR Units","5BR+ Units"]);

function ghRepo(){
  if(OWNER_REPO) return OWNER_REPO;
  if(location.hostname.endsWith("github.io")){
    const owner=location.hostname.split(".")[0];
    const repo=location.pathname.split("/").filter(Boolean)[0];
    if(owner&&repo) return owner+"/"+repo;
  }
  return null;
}

function escHtml(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildHead(){
  const tr=document.createElement("tr");
  const th0=document.createElement("th");th0.className="copy-col";tr.appendChild(th0);
  C.forEach((c,i)=>{
    const th=document.createElement("th");
    if(i===0)th.classList.add("name-col");
    th.innerHTML=escHtml(c)+(i===sortCol?('<span class="ar">'+(sortAsc?"\u25B2":"\u25BC")+'</span>'):"");
    if(i===sortCol)th.classList.add("sorted");
    th.addEventListener("click",()=>{
      sortAsc=(sortCol===i)?!sortAsc:true;
      sortCol=i;page=0;recompute();
    });
    if(i===0){
      const rz=document.createElement("div");rz.className="name-resizer";
      rz.title="Drag to resize \u00B7 double-click to auto-fit";
      rz.addEventListener("mousedown",startNameResize);
      rz.addEventListener("dblclick",e=>{e.stopPropagation();nameWidthManual=null;autofitNameCol();});
      rz.addEventListener("click",e=>e.stopPropagation());
      th.appendChild(rz);
    }
    tr.appendChild(th);
  });
  const head=document.getElementById("tableHead");
  head.innerHTML="";head.appendChild(tr);
}

function recompute(){
  const active=FILTER_MAP.map(f=>({
    q:document.getElementById(f.input).value.trim().toLowerCase(),
    ix:f.cols.map(c=>IDX[c]).filter(i=>i!==undefined)
  })).filter(f=>f.q);
  const gq=document.getElementById("gsearch").value.trim().toLowerCase();

  view=[];
  for(let r=0;r<R.length;r++){
    let ok=true;
    for(const f of active){
      let hit=false;
      for(const i of f.ix){
        const v=R[r][i];
        if(v!==null&&(''+v).toLowerCase().includes(f.q)){hit=true;break;}
      }
      if(!hit){ok=false;break;}
    }
    if(ok&&gq){
      let hit=false;
      const row=R[r];
      for(let i=0;i<row.length;i++){
        const v=row[i];
        if(v!==null&&(''+v).toLowerCase().includes(gq)){hit=true;break;}
      }
      if(!hit)ok=false;
    }
    if(ok)view.push(r);
  }

  const t=T[sortCol], ci=sortCol, dir=sortAsc?1:-1;
  const key = t==="num"
    ? (r)=>{const v=R[r][ci];return v===null?null:+v;}
    : t==="date"
      ? (r)=>{const v=R[r][ci];if(!v)return null;const d=new Date(v);return isNaN(d)?null:d.getTime();}
      : (r)=>{const v=R[r][ci];return v===null?null:(''+v).toLowerCase();};
  view.sort((a,b)=>{
    const ka=key(a),kb=key(b);
    if(ka===null&&kb===null)return 0;
    if(ka===null)return 1;
    if(kb===null)return -1;
    return ka<kb?-dir:(ka>kb?dir:0);
  });

  buildHead();
  render();
  autofitNameCol();
  paginate();
  document.getElementById("resultCount").innerHTML=`<strong>${view.length.toLocaleString()}</strong> properties`;
  document.getElementById("pageInfo").textContent=`Page ${page+1} of ${Math.ceil(view.length/PAGE_SIZE)||1}`;

  /* stat strip: live totals for the current filtered view */
  const uix=IDX["Total Units"];
  let units=0;
  if(uix!==undefined)for(const r of view){const v=R[r][uix];if(v!==null&&!isNaN(+v))units+=+v;}
  document.getElementById("statProps").textContent=view.length.toLocaleString();
  document.getElementById("statUnits").textContent=units.toLocaleString();
}

function disp(colIx,v){
  if(v===null||v===undefined||v==="")return"";
  const c=C[colIx];
  if(T[colIx]==="num"){
    const f=+v;
    if(isNaN(f))return""+v;
    if(c===RATIO)return (f*100).toFixed(2)+"%";
    if(INTC.has(c))return f.toLocaleString("en-US",{maximumFractionDigits:0});
    return f.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:2});
  }
  return""+v;
}

/* ── Property Name column width ─────────────────────────────────────

let nameWidthManual=null;
const _measureCtx=document.createElement("canvas").getContext("2d");
function autofitNameCol(){
  const table=document.getElementById("mainTable");
  if(nameWidthManual!==null){table.style.setProperty("--namew",nameWidthManual+"px");return;}
  _measureCtx.font="600 12.5px 'Libre Franklin', sans-serif";
  let w=0;
  const start=page*PAGE_SIZE, slice=view.slice(start,start+PAGE_SIZE);
  for(const ri of slice){

    if(v!==null)w=Math.max(w,_measureCtx.measureText(''+v).width);
  }
  _measureCtx.font="800 10px 'Libre Franklin', sans-serif";
  w=Math.max(w,_measureCtx.measureText((C[0]||"").toUpperCase()).width*1.12+16);
  const px=Math.min(440,Math.max(140,Math.ceil(w)+24));

function startNameResize(e){
  e.preventDefault();e.stopPropagation();
  const table=document.getElementById("mainTable");
  const startX=e.clientX;
  const startW=parseInt(getComputedStyle(table).getPropertyValue("--namew"))||220;
  const rz=e.target;rz.classList.add("active");
  document.body.style.cursor="col-resize";
  document.body.style.userSelect="none";
  function move(ev){
    nameWidthManual=Math.min(600,Math.max(120,startW+(ev.clientX-startX)));
    table.style.setProperty("--namew",nameWidthManual+"px");
  }
  function up(){
    rz.classList.remove("active");
    document.body.style.cursor="";document.body.style.userSelect="";
    document.removeEventListener("mousemove",move);
    document.removeEventListener("mouseup",up);
  }
  document.addEventListener("mousemove",move);
  document.addEventListener("mouseup",up);
}

function particles(btn){
  const r=btn.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  ["#081937","#162f5e","#0d2347","#ffffff","#c4cde0","#081937"].forEach((col,i)=>{
    const p=document.createElement("div");p.className="particle";
    const a=(Math.PI*2*i)/6,d=18+Math.random()*22;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${3+Math.random()*4}px;height:${3+Math.random()*4}px;background:${col};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d-10}px;animation:particleFly ${.4+Math.random()*.25}s ease-out forwards;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),800);
  });
}
function copyRow(ri,btn,tr){
  const row=R[ri];
  const t=C.map((c,i)=>{
    const v=disp(i,row[i]);
    return(v.includes("\t")||v.includes("\n")||v.includes('"'))?'"'+v.replace(/"/g,'""')+'"':v;
  }).join("\t");
  navigator.clipboard.writeText(t).then(()=>{
    btn.innerHTML=CK;btn.classList.add("success");particles(btn);
    tr.classList.remove("copied");void tr.offsetWidth;tr.classList.add("copied");
    setTimeout(()=>{btn.innerHTML=CI;btn.classList.remove("success");tr.classList.remove("copied");},2000);
  });
}

/* Formatted export: Excel Table, navy bold header, typed columns
   (real dates, thousands separators, ratio as %), auto-fit widths,
   frozen header row. */
function excelDate(v){ /* "MM/DD/YYYY" -> Date at UTC midnight (no TZ shift) */
  const m=(''+v).split("/");
  if(m.length!==3)return null;
  const d=new Date(Date.UTC(+m[2],+m[0]-1,+m[1]));
  return isNaN(d)?null:d;
}
document.getElementById("exportBtn").onclick=async()=>{
  if(!view.length)return;
  if(view.length>5000&&!confirm("Export all "+view.length.toLocaleString()+" filtered rows? Large exports can take ~20-40 seconds to build in the browser."))return;
  setStatus("Building formatted export ("+view.length.toLocaleString()+" rows)\u2026");
  await new Promise(r=>setTimeout(r,50));
  try{
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet("HAP",{views:[{state:"frozen",ySplit:1}]});

    /* typed column definitions (number formats) must precede the data */
    ws.columns=C.map((c,i)=>({
      key:"c"+i,
      style: T[i]==="date" ? {numFmt:"m/d/yyyy"}
           : T[i]==="num"  ? {numFmt:(c===RATIO?"0.00%":"#,##0")}
           : {}
    }));

    /* typed rows */
    const rows=view.map(ri=>C.map((c,i)=>{
      const v=R[ri][i];
      if(v===null||v===undefined||v==="")return null;
      if(T[i]==="num"){const f=+v;return isNaN(f)?(''+v):f;}
      if(T[i]==="date"){const d=excelDate(v);return d||(''+v);}
      return ''+v;
    }));

    /* a real Excel Table with filter buttons and row stripes */
    ws.addTable({
      name:"HAPData", ref:"A1",
      headerRow:true, totalsRow:false,
      style:{theme:"TableStyleMedium2", showRowStripes:true},
      columns:C.map(c=>({name:c,filterButton:true})),
      rows
    });

    /* auto-fit widths (sampled for speed on huge exports) */
    const sample=Math.min(rows.length,1500);
    C.forEach((c,i)=>{
      let w=c.length+3;  /* room for the filter button */
      for(let r2=0;r2<sample;r2++){
        const v=rows[r2][i];
        if(v==null)continue;
        const s2=(v instanceof Date)?"00/00/0000"
               :(typeof v==="number")?v.toLocaleString("en-US",{maximumFractionDigits:2})
               :''+v;
        if(s2.length>w)w=s2.length;
      }
      ws.getColumn(i+1).width=Math.min(Math.max(w+2,10),48);
    });

    /* navy, bold header */
    const hdr=ws.getRow(1);
    hdr.height=20;
    hdr.eachCell(cell=>{
      cell.font={bold:true,color:{argb:"FFFFFFFF"},size:11,name:"Calibri"};
      cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF081937"}};
      cell.alignment={vertical:"middle"};
    });

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    const stamp=new Date().toISOString().slice(0,10);
    a.download="HAP_Export_"+stamp+".xlsx";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    setStatus("",false);
  }catch(e){
    setStatus("Export failed: "+e.message);
  }
};

function paginate(){
  const tp=Math.ceil(view.length/PAGE_SIZE),bar=document.getElementById("paginationBar");
  if(tp<=1){bar.innerHTML="";return;}
  let h=`<button ${page===0?"disabled":""} onclick="go(${page-1})">&#8592;</button>`;
  const s=Math.max(0,page-2),e=Math.min(tp-1,page+2);
  if(s>0)h+=`<button onclick="go(0)">1</button>`;
  if(s>1)h+=`<span class="ellipsis">\u2026</span>`;
  for(let p=s;p<=e;p++)h+=`<button class="${p===page?"active":""}" onclick="go(${p})">${p+1}</button>`;
  if(e<tp-2)h+=`<span class="ellipsis">\u2026</span>`;
  if(e<tp-1)h+=`<button onclick="go(${tp-1})">${tp}</button>`;
  h+=`<button ${page>=tp-1?"disabled":""} onclick="go(${page+1})">&#8594;</button>`;
  bar.innerHTML=h;
}

/* ── Update button ─────────────────────────────────────────────────
   With UPDATE_ENDPOINT set: POST to the relay, which starts the
   GitHub Action running the unchanged HAP updater; then watch the
   run through GitHub's public API and swap in the new data when it
   lands. Without it: open the Run-workflow page (login required). */
const statusEl=document.getElementById("statusStrip");
let tickInt=null;
function setStatus(msg,show=true){
  if(tickInt){clearInterval(tickInt);tickInt=null;}
  statusEl.textContent=msg;statusEl.style.display=show?"block":"none";
}
/* Status line with a live elapsed clock against a goal, e.g.
   "Engine running…  —  1:23 elapsed · goal 4:00"                    */
function fmtClock(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+":"+String(ss).padStart(2,"0");}
function setStatusClock(msg,startMs,goalSec){
  if(tickInt){clearInterval(tickInt);tickInt=null;}
  const draw=()=>{
    const el=Math.max(0,(Date.now()-startMs)/1000);
    const over=el>goalSec?" (running a little long - that's OK)":"";
    statusEl.textContent=msg+"  \u2014  "+fmtClock(el)+" elapsed \u00B7 goal "+fmtClock(goalSec)+over;
    statusEl.style.display="block";
  };
  draw();tickInt=setInterval(draw,1000);
}

document.getElementById("updateBtn").onclick=async function(){
  const repo=ghRepo();
  if(!UPDATE_ENDPOINT){
    if(repo)window.open(`https://github.com/${repo}/actions/workflows/update.yml`,"_blank");
    setStatus("A GitHub tab just opened - click the grey 'Run workflow' button there (requires a GitHub login with repo access). The rebuild takes ~5-10 minutes; refresh this page afterwards.");
    return;
  }
  const btn=this;btn.disabled=true;
  const triggered=Date.now();
  setStatusClock("Requesting update\u2026 pulling this month's HUD files and rebuilding. You can leave this tab open.",triggered,240);
  try{
    const r=await fetch(UPDATE_ENDPOINT,{method:"POST"});
    const j=await r.json().catch(()=>({}));
    if(!r.ok||j.ok===false)throw new Error(j.error||("relay returned "+r.status));
    if(repo)await watchRun(repo,triggered);
    else setStatus("Update started. Refresh this page in ~10 minutes.");
  }catch(e){
    setStatus("Update failed to start: "+e.message);
  }
  btn.disabled=false;
};

async function watchRun(repo,triggered){
  const api=`https://api.github.com/repos/${repo}/actions/workflows/update.yml/runs?per_page=1`;
  const t0=Date.now();
  /* STAGE 1 - the rebuild itself. Goal: 4 minutes. */
  while(Date.now()-t0<25*60*1000){
    await new Promise(r=>setTimeout(r,20000));
    try{
      const res=await fetch(api,{cache:"no-store"});
      if(!res.ok)continue;
      const j=await res.json();
      const run=(j.workflow_runs||[])[0];
      if(!run||new Date(run.created_at).getTime()<triggered-90000)
        {setStatusClock("Update requested - waiting for the engine to start\u2026",triggered,240);continue;}
      if(run.status!=="completed")
        {setStatusClock("Engine running: downloading HUD files and rebuilding the master table\u2026",triggered,240);continue;}
      if(run.conclusion!=="success"){setStatus("The update run finished with status: "+run.conclusion+". Check the Actions tab on GitHub for details.");return;}
      break;
    }catch(e){}
  }
  /* Rebuild done. If the data was already current today, nothing will
     change on the site - say so instead of waiting for a change.      */
  const oldAsof=ASOF;
  const today=new Date().toISOString().slice(0,10);
  if(oldAsof===today){
    setStatus("\u2713 Done - the database was already current as of "+today+", so nothing changed this run.");
    return;
  }
  /* STAGE 2 - GitHub Pages publishing the new data. Goal: 2 minutes. */
  const pubStart=Date.now();
  setStatusClock("Rebuild finished \u2713 - publishing the new data\u2026",pubStart,120);
  for(let i=0;i<12;i++){
    await new Promise(r=>setTimeout(r,20000));
    setStatusClock("Rebuild finished \u2713 - publishing the new data\u2026",pubStart,120);
    try{
      const res=await fetch("hap_state.json?v="+Date.now(),{cache:"no-store"});
      if(!res.ok)continue;
      const d=await res.json();
      if(d.asof&&d.asof!==oldAsof){await loadTiers();applyData(d);setStatus("\u2713 Updated. Data is now current as of "+d.asof+".");return;}
    }catch(e){}
  }
  setStatus("Rebuild finished \u2713 - refresh this page in a minute to see the new data.");
}

/* ── Scroll bar ── */
(function(){
  const wrap  = document.querySelector('.table-wrap');
  const thumb = document.getElementById('scrollThumb');
  const track = document.getElementById('scrollTrack');
  const btnL  = document.getElementById('scrollLeft');
  const btnR  = document.getElementById('scrollRight');

  function update() {
    const sw = wrap.scrollWidth, cw = wrap.clientWidth;
    if (sw <= cw) { thumb.style.width = '100%'; thumb.style.left = '0'; return; }
    const ratio = cw / sw;
    const tw = Math.max(32, track.clientWidth * ratio);
    const maxScroll = sw - cw;
    const maxLeft   = track.clientWidth - tw;
    const leftPct   = (wrap.scrollLeft / maxScroll) * maxLeft;
    thumb.style.width = tw + 'px';
    thumb.style.left  = leftPct + 'px';
  }

  wrap.addEventListener('scroll', update);
  window.addEventListener('resize', update);
  setTimeout(update, 100);

  btnL.addEventListener('click', () => { wrap.scrollBy({ left: -300, behavior: 'smooth' }); });
  btnR.addEventListener('click', () => { wrap.scrollBy({ left:  300, behavior: 'smooth' }); });

  track.addEventListener('click', (e) => {
    if (e.target === thumb) return;
    const rect = track.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    wrap.scrollLeft = pct * (wrap.scrollWidth - wrap.clientWidth);
  });

  let dragging = false, startX = 0, startScroll = 0;
  thumb.addEventListener('mousedown', (e) => {
    dragging = true; startX = e.clientX; startScroll = wrap.scrollLeft;
    thumb.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx       = e.clientX - startX;
    const trackW   = track.clientWidth;
    const thumbW   = thumb.offsetWidth;
    const maxLeft  = trackW - thumbW;
    const maxScroll= wrap.scrollWidth - wrap.clientWidth;
    wrap.scrollLeft = startScroll + (dx / maxLeft) * maxScroll;
  });
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; thumb.classList.remove('dragging'); }
  });

  const observer = new MutationObserver(() => setTimeout(update, 50));
  observer.observe(document.getElementById('tableBody'), { childList: true });
})();
</script>
</body>
</html>
