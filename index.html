<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --blue-dark:  #1a3a5c;
      --blue-mid:   #2563eb;
      --blue-light: #dbeafe;
      --gray-bg:    #f8fafc;
      --gray-border:#e2e8f0;
      --text:       #1e293b;
      --text-light: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; font-size: 13px; color: var(--text); background: var(--gray-bg); }

    header {
      background: var(--blue-dark); color: #fff;
      padding: 14px 20px; display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 11px; opacity: .7; }

    .controls {
      background: #fff; border-bottom: 1px solid var(--gray-border);
      padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
    }
    .control-group { display: flex; flex-direction: column; gap: 3px; }
    .control-group label { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .05em; }
    input[type="text"] {
      border: 1px solid var(--gray-border); border-radius: 4px;
      padding: 5px 9px; font-size: 13px; height: 32px; width: 170px;
    }
    input[type="text"]:focus { outline: none; border-color: var(--blue-mid); box-shadow: 0 0 0 2px rgba(37,99,235,.12); }

    .btn { height: 32px; padding: 0 14px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: 700; }
    .btn-primary   { background: var(--blue-mid); color: #fff; }
    .btn-secondary { background: #e2e8f0; color: var(--text); }
    .btn:hover { opacity: .85; }

    .status-bar {
      padding: 7px 20px; font-size: 11px; color: var(--text-light);
      background: var(--blue-light); display: flex; justify-content: space-between; align-items: center;
    }

    .table-wrap { overflow-x: auto; padding: 0 20px 32px; }

    table {
      border-collapse: collapse; margin-top: 14px;
      font-size: 12px; background: #fff;
      border: 1px solid var(--gray-border);
    }

    thead tr { background: var(--blue-dark); color: #fff; }
    thead th {
      padding: 9px 10px; text-align: left; font-weight: 600;
      font-size: 11px; white-space: nowrap; cursor: pointer;
      user-select: none; border-right: 1px solid rgba(255,255,255,.1);
    }
    thead th:hover { background: #244b76; }
    thead th.copy-col { cursor: default; width: 52px; min-width: 52px; }

    tbody tr { border-bottom: 1px solid var(--gray-border); transition: background .1s; }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:hover { background: var(--blue-light); }

    /* Copy flash animation */
    @keyframes rowFlash {
      0%   { background: #bbf7d0; }
      60%  { background: #dcfce7; }
      100% { background: transparent; }
    }
    @keyframes sweepShine {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    tbody tr.copied {
      animation: rowFlash 1.2s ease-out forwards;
    }

    td {
      padding: 7px 10px; white-space: nowrap;
      border-right: 1px solid var(--gray-border);
      max-width: 200px; overflow: hidden; text-overflow: ellipsis;
    }

    /* Sticky copy button column */
    td.copy-col, th.copy-col {
      position: sticky; left: 0; z-index: 2;
      background: inherit;
      border-right: 2px solid var(--gray-border);
      padding: 4px 6px;
    }
    thead th.copy-col { background: var(--blue-dark); z-index: 3; }
    tbody tr:nth-child(even) td.copy-col { background: #f8fafc; }
    tbody tr:hover td.copy-col { background: var(--blue-light); }
    tbody tr.copied td.copy-col { animation: rowFlash 1.2s ease-out forwards; }

    .copy-btn {
      display: flex; align-items: center; justify-content: center; gap: 4px;
      width: 40px; height: 26px;
      border-radius: 5px; border: 1.5px solid var(--gray-border);
      background: #fff; cursor: pointer; font-size: 11px; font-weight: 700;
      color: var(--text-light); transition: all .2s; padding: 0;
    }
    .copy-btn:hover { border-color: var(--blue-mid); color: var(--blue-mid); background: var(--blue-light); transform: scale(1.05); }
    .copy-btn.success { border-color: #16a34a; color: #16a34a; background: #dcfce7; transform: scale(1.08); }
    .copy-btn svg { flex-shrink: 0; }

    .pagination { display: flex; align-items: center; gap: 6px; padding: 10px 20px; justify-content: center; }
    .pagination button { border: 1px solid var(--gray-border); background: #fff; border-radius: 4px; padding: 4px 11px; cursor: pointer; font-size: 12px; }
    .pagination button:disabled { opacity: .35; cursor: default; }
    .pagination button.active { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); }

    #loading { text-align: center; padding: 48px; color: var(--text-light); }
  </style>
</head>

// Build header row once
(function buildHeader() {
  const tr = document.createElement("tr");
  // Sticky copy column header
  const copyTh = document.createElement("th");
  copyTh.className = "copy-col";
  copyTh.textContent = "";
  tr.appendChild(copyTh);
  // Data columns
  COLUMNS.forEach(col => {
    const th = document.createElement("th");
    th.textContent = col.label;
    th.dataset.col = col.key;
    th.addEventListener("click", () => {
      sortAsc = sortCol === col.key ? !sortAsc : true;
      sortCol = col.key;
      currentPage = 0;
      loadData();
    });
    tr.appendChild(th);
  });
  document.getElementById("tableHead").appendChild(tr);
})();

// ── Helpers ───────────────────────────────────────────────────────────

function fmtDate(val) {
  if (!val) return "";
  const d = new Date(val);
  return isNaN(d) ? val : d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

function debounce(fn, ms) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fn, ms);
}

// ── Query builder ─────────────────────────────────────────────────────

function buildQuery(forCount = false) {
  let q = forCount
    ? db.from(TABLE).select("id", { count: "exact", head: true })
    : db.from(TABLE).select("*");

  const name   = document.getElementById("searchName").value.trim();
  const city   = document.getElementById("searchCity").value.trim();
  const county = document.getElementById("searchCounty").value.trim();
  const zip    = document.getElementById("searchZip").value.trim();
  const msa    = document.getElementById("searchMsa").value.trim();

  if (name)   q = q.ilike("property_name",  `%${name}%`);
  if (city)   q = q.ilike("city",           `%${city}%`);
  if (county) q = q.ilike("county",         `%${county}%`);
  if (zip)    q = q.ilike("zip_code",       `%${zip}%`);
  if (msa)    q = q.ilike("msa_name_text",  `%${msa}%`);

  return q;
}

// ── Load data ─────────────────────────────────────────────────────────

async function loadData() {
  document.getElementById("loading").style.display = "block";
  document.getElementById("mainTable").style.display = "none";
  document.getElementById("paginationBar").innerHTML = "";

  const { count } = await buildQuery(true);
  totalCount = count || 0;

  const from = currentPage * PAGE_SIZE;
  const { data, error } = await buildQuery()
    .order(sortCol, { ascending: sortAsc })
    .range(from, from + PAGE_SIZE - 1);

  if (error) { document.getElementById("loading").textContent = "Error: " + error.message; return; }

  currentRows = data || [];
  renderTable(currentRows);
  renderPagination();

  document.getElementById("resultCount").textContent = `${totalCount.toLocaleString()} properties found`;
  document.getElementById("pageInfo").textContent = `Page ${currentPage + 1} of ${Math.ceil(totalCount / PAGE_SIZE) || 1}`;
  document.getElementById("loading").style.display = "none";
  document.getElementById("mainTable").style.display = "table";
}

// ── Render table ──────────────────────────────────────────────────────

const COPY_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CHECK_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function renderTable(rows) {
  const tbody = document.getElementById("tableBody");
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="${COLUMNS.length + 1}" style="padding:28px;text-align:center;color:#64748b">No results found.</td></tr>`;
    return;
  }

  tbody.innerHTML = "";

  rows.forEach((r, i) => {
    const tr = document.createElement("tr");
    tr.id = `row-${i}`;

    // Sticky copy button cell
    const copyTd = document.createElement("td");
    copyTd.className = "copy-col";
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.innerHTML = COPY_ICON;
    btn.title = "Copy row to clipboard";
    btn.onclick = () => copyRow(i, btn, tr);
    copyTd.appendChild(btn);
    tr.appendChild(copyTd);

    // Data cells
    COLUMNS.forEach(col => {
      const td = document.createElement("td");
      let val = r[col.key];
      if (val == null) val = "";
      // Format dates for display
      if (col.key.includes("date") && val) val = fmtDate(val);
      td.textContent = val;
      td.title = String(val);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

// ── Copy row ──────────────────────────────────────────────────────────

function copyRow(idx, btn, tr) {
  const r = currentRows[idx];
  const tsv = COLUMNS.map(col => {
    const val = r[col.key];
    if (val == null) return "";
    const str = String(val);
    if (str.includes("\t") || str.includes("\n") || str.includes('"')) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  }).join("\t");

  navigator.clipboard.writeText(tsv).then(() => {
    // Button animation
    btn.innerHTML = CHECK_ICON;
    btn.classList.add("success");

    // Row flash animation
    tr.classList.remove("copied");
    void tr.offsetWidth; // force reflow to restart animation
    tr.classList.add("copied");

    setTimeout(() => {
      btn.innerHTML = COPY_ICON;
      btn.classList.remove("success");
      tr.classList.remove("copied");
    }, 2000);
  });
}

// ── Export current page to Excel ──────────────────────────────────────

document.getElementById("exportBtn").onclick = () => {
  if (!currentRows.length) return;
  const exportData = currentRows.map(r =>
    Object.fromEntries(COLUMNS.map(col => [col.label, r[col.key] ?? ""]))
  );
  const ws = XLSX.utils.json_to_sheet(exportData, { header: COLUMNS.map(c => c.label) });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "HAP Properties");
  XLSX.writeFile(wb, "hap_export.xlsx");
};

// ── Pagination ────────────────────────────────────────────────────────

function renderPagination() {
  const totalPages = Math.ceil(totalCount / PAGE_SIZE);
  const bar = document.getElementById("paginationBar");
  if (totalPages <= 1) { bar.innerHTML = ""; return; }
  let html = `<button ${currentPage===0?"disabled":""} onclick="goPage(${currentPage-1})">&#8592; Prev</button>`;
  const start = Math.max(0, currentPage - 2);
  const end   = Math.min(totalPages - 1, currentPage + 2);
  if (start > 0) html += `<button onclick="goPage(0)">1</button>`;
  if (start > 1) html += `<span style="padding:0 4px">…</span>`;
  for (let p = start; p <= end; p++) {
    html += `<button class="${p===currentPage?"active":""}" onclick="goPage(${p})">${p+1}</button>`;
  }
  if (end < totalPages - 2) html += `<span style="padding:0 4px">…</span>`;
  if (end < totalPages - 1) html += `<button onclick="goPage(${totalPages-1})">${totalPages}</button>`;
  html += `<button ${currentPage>=totalPages-1?"disabled":""} onclick="goPage(${currentPage+1})">Next &#8594;</button>`;
  bar.innerHTML = html;
}

function goPage(p) { currentPage = p; loadData(); window.scrollTo({ top: 0, behavior: "smooth" }); }

// ── Dynamic search (debounced 400ms) ─────────────────────────────────

["searchName","searchCity","searchCounty","searchZip","searchMsa"].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    debounce(() => { currentPage = 0; loadData(); }, 400);
  });
});

document.getElementById("resetBtn").onclick = () => {
  ["searchName","searchCity","searchCounty","searchZip","searchMsa"].forEach(id => {
    document.getElementById(id).value = "";
  });
  currentPage = 0;
  loadData();
