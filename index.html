<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAP Property Database</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --blue-dark:  #1a3a5c;
      --blue-mid:   #2563eb;
      --blue-light: #dbeafe;
      --gray-bg:    #f8fafc;
      --gray-border:#e2e8f0;
      --text:       #1e293b;
      --text-light: #64748b;
      --green:      #15803d;
      --red:        #dc2626;
      --yellow:     #d97706;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--gray-bg);
    }

    header {
      background: var(--blue-dark);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 { font-size: 20px; font-weight: 700; }
    header p  { font-size: 12px; opacity: 0.75; }

    .controls {
      background: #fff;
      border-bottom: 1px solid var(--gray-border);
      padding: 14px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }

    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-group label { font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: .04em; }

    input[type="text"], select {
      border: 1px solid var(--gray-border);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      height: 34px;
    }
    input[type="text"] { width: 220px; }
    select { width: 160px; }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--blue-mid);
      box-shadow: 0 0 0 2px rgba(37,99,235,.15);
    }

    .btn {
      height: 34px;
      padding: 0 16px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--blue-mid); color: #fff; }
    .btn-secondary { background: var(--gray-border); color: var(--text); }

    .status-bar {
      padding: 8px 24px;
      font-size: 12px;
      color: var(--text-light);
      background: var(--blue-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    .table-wrap {
      overflow-x: auto;
      padding: 0 24px 24px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 13px;
      background: #fff;
      border: 1px solid var(--gray-border);
      border-radius: 6px;
      overflow: hidden;
    }

    thead tr { background: var(--blue-dark); color: #fff; }
    thead th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { background: #244b76; }

    tbody tr { border-bottom: 1px solid var(--gray-border); }
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:hover { background: var(--blue-light); }

    td {
      padding: 8px 12px;
      vertical-align: top;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td.wrap { white-space: normal; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-green  { background: #dcfce7; color: var(--green); }
    .badge-red    { background: #fee2e2; color: var(--red); }
    .badge-yellow { background: #fef3c7; color: var(--yellow); }
    .badge-blue   { background: var(--blue-light); color: var(--blue-dark); }

    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      justify-content: center;
    }
    .pagination button {
      border: 1px solid var(--gray-border);
      background: #fff;
      border-radius: 4px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 13px;
    }
    .pagination button:disabled { opacity: .4; cursor: default; }
    .pagination button.active { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); }

    #loading {
      text-align: center;
      padding: 48px;
      color: var(--text-light);
      font-size: 14px;
    }

    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 8px;
      width: 100%;
      max-width: 760px;
      padding: 28px;
      position: relative;
    }
    .modal h2 { font-size: 18px; color: var(--blue-dark); margin-bottom: 16px; }
    .modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--text-light);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
    }
    .detail-group { display: flex; flex-direction: column; gap: 2px; }
    .detail-group label { font-size: 11px; color: var(--text-light); text-transform: uppercase; font-weight: 600; }
    .detail-group span  { font-size: 13px; color: var(--text); word-break: break-word; }
    .section-title { grid-column: 1/-1; font-weight: 700; color: var(--blue-dark); border-bottom: 1px solid var(--gray-border); padding-bottom: 4px; margin-top: 12px; }

    @media (max-width: 600px) {
      .controls { padding: 12px; }
      .table-wrap { padding: 0 8px 24px; }
      input[type="text"] { width: 140px; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ============================================================
     CONFIGURE YOUR SUPABASE CREDENTIALS BELOW
     ============================================================ -->
<script>
  const SUPABASE_URL = "https://ubdslkgttbxdcjegpvpm.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_sTUadAyRjSxQxsAyCLjrfw_1AKFZUcb";
  const TABLE = "hap_properties";
  const PAGE_SIZE = 50;
</script>
<!-- ============================================================ -->

<header>
  <div>
    <h1>HAP Property Database</h1>
    <p>HUD Section 8 Housing Assistance Payments</p>
  </div>
  <button class="btn btn-secondary" id="exportBtn">Export CSV</button>
</header>

<div class="controls">
  <div class="control-group">
    <label>Property Name</label>
    <input type="text" id="searchName" placeholder="Search..." />
  </div>
  <div class="control-group">
    <label>City</label>
    <input type="text" id="searchCity" placeholder="City..." />
  </div>
  <div class="control-group">
    <label>State</label>
    <select id="filterState"><option value="">All States</option></select>
  </div>
  <div class="control-group">
    <label>Program Type</label>
    <select id="filterProgram"><option value="">All Programs</option></select>
  </div>
  <div class="control-group">
    <label>Expiring Within</label>
    <select id="filterExpiry">
      <option value="">Any Date</option>
      <option value="90">90 Days</option>
      <option value="180">180 Days</option>
      <option value="365">1 Year</option>
      <option value="730">2 Years</option>
    </select>
  </div>
  <div class="control-group">
    <label>REAC Score Min</label>
    <input type="text" id="filterReac" placeholder="e.g. 60" style="width:100px" />
  </div>
  <button class="btn btn-primary" id="searchBtn">Search</button>
  <button class="btn btn-secondary" id="resetBtn">Reset</button>
</div>

<div class="status-bar">
  <span id="resultCount">Loading...</span>
  <span id="pageInfo"></span>
</div>

<div class="table-wrap">
  <div id="loading">Connecting to database...</div>
  <table id="mainTable" style="display:none">
    <thead>
      <tr>
        <th data-col="property_name">Property Name</th>
        <th data-col="city">City</th>
        <th data-col="state">State</th>
        <th data-col="total_units">Units</th>
        <th data-col="program_type">Program</th>
        <th data-col="hap_expiration_date">HAP Expiry</th>
        <th data-col="contract_number">Contract #</th>
        <th data-col="last_reac_1">REAC</th>
        <th data-col="f_1br_rent">1BR Rent</th>
        <th data-col="f_2br_rent">2BR Rent</th>
        <th data-col="renewal_type">Renewal Type</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="pagination" id="paginationBar"></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">&#x2715;</button>
    <h2 id="modalTitle"></h2>
    <div class="detail-grid" id="modalContent"></div>
  </div>
</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentPage = 0;
let totalCount = 0;
let sortCol = "property_name";
let sortAsc = true;
let currentRows = [];

// ── Helpers ──────────────────────────────────────────────────────────

function fmtDate(val) {
  if (!val) return "—";
  const d = new Date(val);
  if (isNaN(d)) return val;
  return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

function fmtMoney(val) {
  if (val == null || val === "") return "—";
  return "$" + Number(val).toLocaleString();
}

function expiryBadge(dateStr) {
  if (!dateStr) return `<span class="badge badge-blue">—</span>`;
  const exp = new Date(dateStr);
  const today = new Date();
  const days = Math.round((exp - today) / 86400000);
  if (days < 0)  return `<span class="badge badge-red">Expired</span>`;
  if (days < 90) return `<span class="badge badge-red">${fmtDate(dateStr)}</span>`;
  if (days < 365) return `<span class="badge badge-yellow">${fmtDate(dateStr)}</span>`;
  return `<span class="badge badge-green">${fmtDate(dateStr)}</span>`;
}

// ── Build query ───────────────────────────────────────────────────────

function buildQuery(forCount = false) {
  let q = db.from(TABLE);

  if (forCount) {
    q = q.select("id", { count: "exact", head: true });
  } else {
    q = q.select("*");
  }

  const name = document.getElementById("searchName").value.trim();
  if (name) q = q.ilike("property_name", `%${name}%`);

  const city = document.getElementById("searchCity").value.trim();
  if (city) q = q.ilike("city", `%${city}%`);

  const state = document.getElementById("filterState").value;
  if (state) q = q.eq("state", state);

  const program = document.getElementById("filterProgram").value;
  if (program) q = q.eq("program_type", program);

  const expiry = document.getElementById("filterExpiry").value;
  if (expiry) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() + parseInt(expiry));
    q = q.lte("hap_expiration_date", cutoff.toISOString().split("T")[0]);
    q = q.gte("hap_expiration_date", new Date().toISOString().split("T")[0]);
  }

  const reacMin = document.getElementById("filterReac").value.trim();
  if (reacMin && !isNaN(reacMin)) {
    q = q.gte("last_react_no_letter_1", parseFloat(reacMin));
  }

  return q;
}

// ── Load data ─────────────────────────────────────────────────────────

async function loadData() {
  document.getElementById("loading").style.display = "block";
  document.getElementById("mainTable").style.display = "none";

  const countQuery = buildQuery(true);
  const { count, error: countErr } = await countQuery;
  if (countErr) { console.error(countErr); }
  totalCount = count || 0;

  const from = currentPage * PAGE_SIZE;
  const to   = from + PAGE_SIZE - 1;

  const dataQuery = buildQuery()
    .order(sortCol, { ascending: sortAsc })
    .range(from, to);

  const { data, error } = await dataQuery;

  if (error) {
    document.getElementById("loading").textContent = "Error: " + error.message;
    return;
  }

  currentRows = data || [];
  renderTable(currentRows);
  renderPagination();

  document.getElementById("resultCount").textContent =
    `${totalCount.toLocaleString()} properties found`;
  document.getElementById("pageInfo").textContent =
    `Page ${currentPage + 1} of ${Math.ceil(totalCount / PAGE_SIZE) || 1}`;
  document.getElementById("loading").style.display = "none";
  document.getElementById("mainTable").style.display = "table";
}

// ── Render table ──────────────────────────────────────────────────────

function renderTable(rows) {
  const tbody = document.getElementById("tableBody");
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="12" style="padding:24px;text-align:center;color:#64748b">No results found.</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map((r, i) => `
    <tr>
      <td title="${r.property_name || ""}">${r.property_name || "—"}</td>
      <td>${r.city || "—"}</td>
      <td>${r.state || "—"}</td>
      <td>${r.total_units ?? "—"}</td>
      <td title="${r.program_type || ""}">${truncate(r.program_type, 20)}</td>
      <td>${expiryBadge(r.hap_expiration_date)}</td>
      <td>${r.contract_number || "—"}</td>
      <td>${r.last_reac_1 || "—"}</td>
      <td>${r.f_1br_rent ? fmtMoney(r.f_1br_rent) : "—"}</td>
      <td>${r.f_2br_rent ? fmtMoney(r.f_2br_rent) : "—"}</td>
      <td title="${r.renewal_type || ""}">${truncate(r.renewal_type, 22)}</td>
      <td><button class="btn btn-secondary" style="height:26px;font-size:11px;padding:0 8px" onclick="openModal(${i})">Details</button></td>
    </tr>
  `).join("");
}

function truncate(str, n) {
  if (!str) return "—";
  return str.length > n ? str.slice(0, n) + "…" : str;
}

// ── Pagination ────────────────────────────────────────────────────────

function renderPagination() {
  const totalPages = Math.ceil(totalCount / PAGE_SIZE);
  const bar = document.getElementById("paginationBar");
  if (totalPages <= 1) { bar.innerHTML = ""; return; }

  let html = `<button ${currentPage === 0 ? "disabled" : ""} onclick="goPage(${currentPage - 1})">&#8592; Prev</button>`;

  const start = Math.max(0, currentPage - 2);
  const end   = Math.min(totalPages - 1, currentPage + 2);
  if (start > 0) html += `<button onclick="goPage(0)">1</button>`;
  if (start > 1) html += `<span style="padding:0 4px">…</span>`;
  for (let p = start; p <= end; p++) {
    html += `<button class="${p === currentPage ? "active" : ""}" onclick="goPage(${p})">${p + 1}</button>`;
  }
  if (end < totalPages - 2) html += `<span style="padding:0 4px">…</span>`;
  if (end < totalPages - 1) html += `<button onclick="goPage(${totalPages - 1})">${totalPages}</button>`;
  html += `<button ${currentPage >= totalPages - 1 ? "disabled" : ""} onclick="goPage(${currentPage + 1})">Next &#8594;</button>`;

  bar.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  loadData();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ── Modal ─────────────────────────────────────────────────────────────

function openModal(idx) {
  const r = currentRows[idx];
  document.getElementById("modalTitle").textContent = r.property_name || "Property Detail";

  const fields = [
    { section: "Contract" },
    { label: "Contract Number",   val: r.contract_number },
    { label: "Property ID",       val: r.property_id },
    { label: "Program Type",      val: r.program_type },
    { label: "Doc Type",          val: r.doc_type },
    { label: "HAP Effective",     val: fmtDate(r.hap_effective_date) },
    { label: "HAP Expiration",    val: fmtDate(r.hap_expiration_date) },
    { label: "Renewal Type",      val: r.renewal_type },
    { label: "Contract Units",    val: r.contract_units },
    { label: "Rent-to-FMR",      val: r.rent_to_fmr_ratio != null ? Number(r.rent_to_fmr_ratio).toFixed(3) : "—" },

    { section: "Location" },
    { label: "Address",           val: [r.address_line1_text, r.address_line2_text].filter(Boolean).join(", ") },
    { label: "City / State / ZIP",val: [r.city_name_text, r.state_code, r.zip_code].filter(Boolean).join(", ") },
    { label: "County",            val: r.county },
    { label: "MSA",               val: r.msa_name_text },
    { label: "Phone",             val: r.property_phone_number },

    { section: "Rents & UAs" },
    { label: "0BR Rent / UA",  val: `${fmtMoney(r.f_0br_rent)} / ${fmtMoney(r.f_0br_ua)}` },
    { label: "1BR Rent / UA",  val: `${fmtMoney(r.f_1br_rent)} / ${fmtMoney(r.f_1br_ua)}` },
    { label: "2BR Rent / UA",  val: `${fmtMoney(r.f_2br_rent)} / ${fmtMoney(r.f_2br_ua)}` },
    { label: "3BR Rent / UA",  val: `${fmtMoney(r.f_3br_rent)} / ${fmtMoney(r.f_3br_ua)}` },
    { label: "4BR Rent / UA",  val: `${fmtMoney(r.f_4br_rent)} / ${fmtMoney(r.f_4br_ua)}` },
    { label: "5BR+ Rent / UA", val: `${fmtMoney(r.f_5br_rent)} / ${fmtMoney(r.f_5br_ua)}` },

    { section: "REAC Scores" },
    { label: "Score 1 / Date", val: `${r.last_reac_1 || "—"} — ${fmtDate(r.last_reac_date_1)}` },
    { label: "Score 2 / Date", val: `${r.last_reac_2 || "—"} — ${fmtDate(r.last_reac_date_2)}` },
    { label: "Score 3 / Date", val: `${r.last_reac_3 || "—"} — ${fmtDate(r.last_reac_date_3)}` },

    { section: "Owner" },
    { label: "Organization",  val: r.owner_organization_name },
    { label: "Contact",       val: r.owner_individual_full_name },
    { label: "Address",       val: [r.owner_address_line1, r.owner_city_name, r.owner_state_code].filter(Boolean).join(", ") },
    { label: "Phone",         val: r.owner_main_phone_number_text },
    { label: "Email",         val: r.owner_contact_email_text },

    { section: "Management Agent" },
    { label: "Organization",  val: r.mgmt_agent_org_name },
    { label: "Contact",       val: r.mgmt_agent_full_name },
    { label: "Address",       val: [r.mgmt_agent_address_line1, r.mgmt_agent_city_name, r.mgmt_agent_state_code].filter(Boolean).join(", ") },
    { label: "Phone",         val: r.mgmt_agent_main_phone_number },
    { label: "Email",         val: r.mgmt_contact_email_text },
  ];

  const content = fields.map(f => {
    if (f.section) return `<div class="section-title">${f.section}</div>`;
    return `<div class="detail-group"><label>${f.label}</label><span>${f.val || "—"}</span></div>`;
  }).join("");

  document.getElementById("modalContent").innerHTML = content;
  document.getElementById("modalOverlay").classList.add("open");
}

document.getElementById("modalClose").onclick = () =>
  document.getElementById("modalOverlay").classList.remove("open");
document.getElementById("modalOverlay").onclick = (e) => {
  if (e.target.id === "modalOverlay")
    document.getElementById("modalOverlay").classList.remove("open");
};

// ── Populate filter dropdowns ─────────────────────────────────────────

async function loadFilters() {
  const stateRes = await db.from(TABLE).select("state").not("state", "is", null).order("state");
  if (!stateRes.error) {
    const states = [...new Set(stateRes.data.map(r => r.state))].sort();
    const sel = document.getElementById("filterState");
    states.forEach(s => sel.add(new Option(s, s)));
  }

  const progRes = await db.from(TABLE).select("program_type").not("program_type", "is", null).order("program_type");
  if (!progRes.error) {
    const programs = [...new Set(progRes.data.map(r => r.program_type))].sort();
    const sel = document.getElementById("filterProgram");
    programs.forEach(p => sel.add(new Option(p, p)));
  }
}

// ── Sort ──────────────────────────────────────────────────────────────

document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    currentPage = 0;
    loadData();
  });
});

// ── Export CSV ────────────────────────────────────────────────────────

document.getElementById("exportBtn").onclick = async () => {
  document.getElementById("exportBtn").textContent = "Exporting...";
  let all = [];
  let page = 0;
  const batchSize = 1000;
  while (true) {
    const { data } = await buildQuery().range(page * batchSize, (page + 1) * batchSize - 1);
    if (!data || !data.length) break;
    all = all.concat(data);
    if (data.length < batchSize) break;
    page++;
  }
  if (!all.length) { document.getElementById("exportBtn").textContent = "Export CSV"; return; }
  const cols = Object.keys(all[0]);
  const csv = [cols.join(","), ...all.map(row =>
    cols.map(c => JSON.stringify(row[c] ?? "")).join(",")
  )].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "hap_export.csv"; a.click();
  document.getElementById("exportBtn").textContent = "Export CSV";
};

// ── Event wiring ──────────────────────────────────────────────────────

document.getElementById("searchBtn").onclick = () => { currentPage = 0; loadData(); };
document.getElementById("resetBtn").onclick  = () => {
  document.getElementById("searchName").value = "";
  document.getElementById("searchCity").value = "";
  document.getElementById("filterState").value = "";
  document.getElementById("filterProgram").value = "";
  document.getElementById("filterExpiry").value = "";
  document.getElementById("filterReac").value = "";
  currentPage = 0; loadData();
};

["searchName", "searchCity"].forEach(id => {
  document.getElementById(id).addEventListener("keyup", e => {
    if (e.key === "Enter") { currentPage = 0; loadData(); }
  });
});

// ── Init ──────────────────────────────────────────────────────────────

loadFilters();
loadData();
</script>
</body>
</html>
