  <style>
    :root {
      --navy:        #081937;
      --navy-mid:    #0d2347;
      --navy-light:  #162f5e;
      --navy-faint:  #1a3570;
      --white:       #ffffff;
      --off-white:   #f4f6f9;
      --rule:        #dde3ee;
      --rule-dark:   #c4cde0;
      --text:        #0d1e3a;
      --text-mid:    #3d5070;
      --text-light:  #6b7fa0;
      --row-alt:     #f8fafd;
      --hover-row:   #eef2fa;
      --copy-flash:  #dce8ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Libre Franklin', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--off-white);
      -webkit-font-smoothing: antialiased;
    }

    .top-stripe { height: 4px; background: var(--white); }

    header {
      background: var(--navy);
      padding: 0 28px;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid var(--navy-faint);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .site-label {
      font-size: 10px; font-weight: 800;
      color: rgba(255,255,255,.5); letter-spacing: .2em;
      text-transform: uppercase;
    }
    .header-divider { width: 1px; height: 16px; background: rgba(255,255,255,.15); }
    header h1 { font-size: 17px; font-weight: 800; color: var(--white); letter-spacing: -.01em; }
    .asof-label {
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,.35);
      letter-spacing: .12em; text-transform: uppercase;
    }
    .asof-label strong { color: rgba(255,255,255,.75); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .hdr-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 32px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.25);
      background: transparent; color: rgba(255,255,255,.7);
      cursor: pointer; font-size: 11px; font-weight: 700;
      font-family: inherit; letter-spacing: .08em; text-transform: uppercase;
      transition: all .15s;
    }
    .hdr-btn:hover { border-color: var(--white); color: var(--white); background: rgba(255,255,255,.08); }
    .hdr-btn:disabled { opacity: .45; cursor: progress; }
    .hdr-btn.update { border-color: rgba(126,224,165,.5); color: #7ee0a5; }
    .hdr-btn.update:hover { border-color: #7ee0a5; color: #b6f0cd; background: rgba(28,122,63,.25); }

    .search-bar {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--navy-faint);
      padding: 12px 28px;
      display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 9px; font-weight: 800; color: rgba(255,255,255,.4);
      text-transform: uppercase; letter-spacing: .15em;
    }
    .field-inner { position: relative; }
    .field-inner svg {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      color: rgba(255,255,255,.25); pointer-events: none; transition: color .15s;
    }
    input[type="text"] {
      height: 34px; padding: 0 10px 0 30px;
      border: 1px solid rgba(255,255,255,.12); border-radius: 3px;
      font-size: 13px; font-family: inherit;
      color: var(--white);
      background: rgba(255,255,255,.07);
      transition: border-color .15s, background .15s;
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,.25); }
    input[type="text"]:focus {
      outline: none;
      border-color: rgba(255,255,255,.5);
      background: rgba(255,255,255,.12);
      box-shadow: 0 0 0 3px rgba(255,255,255,.06);
    }
    .field-inner:focus-within svg { color: rgba(255,255,255,.6); }

    .btn-reset {
      height: 34px; padding: 0 14px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.15);
      background: transparent; color: rgba(255,255,255,.45);
      cursor: pointer; font-size: 11px;
      font-family: inherit; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      transition: all .15s;
    }
    .btn-reset:hover { border-color: rgba(255,255,255,.4); color: rgba(255,255,255,.8); }

    .result-line {
      padding: 7px 28px;
      background: var(--navy);
      border-bottom: 3px solid var(--navy-light);
      display: flex; justify-content: space-between; align-items: center;
    }
    .result-line span {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,.4); letter-spacing: .02em;
    }
    .result-line strong { color: rgba(255,255,255,.85); font-weight: 700; }
    .rl-right { display: flex; align-items: center; gap: 16px; }
    .rows-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 800; color: rgba(255,255,255,.4);
      letter-spacing: .12em; text-transform: uppercase;
    }
    .rows-label select {
      height: 22px; padding: 0 4px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.25);
      background: var(--navy-mid); color: rgba(255,255,255,.85);
      font-family: inherit; font-size: 11px; font-weight: 700;
      cursor: pointer; outline: none;
    }
    .rows-label select:hover { border-color: rgba(255,255,255,.55); }

    /* ── Table / Map toggle ── */

<script>
  /* ────────────────────────────────────────────────────────────────
     CONFIG

     instead opens the GitHub "Run workflow" page (login required).
     OWNER_REPO: "user/repo" - leave "" to auto-detect from the URL.
  ──────────────────────────────────────────────────────────────── */
  const BUILD = "2026-07-21l · chuck-e-choke";

</script>

<script>
/* ── Skeleton ── */
(function(){
  const w=document.getElementById("skelWrap");
  const hd=document.createElement("div");hd.className="skel-head";
  [30,105,52,38,78,38,148,88,70,82,82,50,40,40,40,76,76].forEach(x=>{
    const s=document.createElement("div");s.className="skel dark";s.style.width=x+"px";hd.appendChild(s);
  });
  w.appendChild(hd);
  for(let i=0;i<16;i++){
    const r=document.createElement("div");r.className="skel-row";
    [26,108,50,38,70,38,148,86,68,80,80,50,40,40,40,76,76].forEach((x,j)=>{
      const s=document.createElement("div");s.className="skel";
      s.style.width=(x+Math.random()*16-8)+"px";
      s.style.animationDelay=(i*.03+j*.007)+"s";
      r.appendChild(s);
    });
    w.appendChild(r);
  }
})();

/* ── Data state ────────────────────────────────────────────────────
   Everything comes from hap_state.json, produced by the UNCHANGED
   HAP pipeline (hap_pipeline.py) running inside the GitHub Action. */
let C=[], T=[], R=[], ASOF="";
let TIERS={};      // contract -> [[bed, units, rent, fmr, ua], ...] for multi-tier contracts
let PROP_N={};     // property id -> number of contract rows in the master
let COORDS={};     // property id -> [lat, lon] (HUD GIS layer)
let VIEW_MODE="table", MAP=null, CLUSTER=null, mapStale=true;
let view=[];
let page=0, sortCol=0, sortAsc=true, timer=null;

let IDX={};
const FILTER_MAP=[
  {input:"searchName",  cols:["Property Name"]},
  {input:"searchCity",  cols:["City"]},
  {input:"searchState", cols:["State","state_code"]},
  {input:"searchCounty",cols:["County"]},
  {input:"searchZip",   cols:["zip_code"]},
  {input:"searchMsa",   cols:["msa_name_text"]},
];
const RATIO="Rent-to-FMR Ratio";
const INTC=new Set(["Total Units","Contract Units","property_total_unit_count",
  "0BR Units","1BR Units","2BR Units","3BR Units","4BR Units","5BR+ Units"]);

function ghRepo(){
  if(OWNER_REPO) return OWNER_REPO;
  if(location.hostname.endsWith("github.io")){
    const owner=location.hostname.split(".")[0];
    const repo=location.pathname.split("/").filter(Boolean)[0];
    if(owner&&repo) return owner+"/"+repo;
  }
  return null;
}

function escHtml(s){return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildHead(){
  const tr=document.createElement("tr");
  const th0=document.createElement("th");th0.className="copy-col";tr.appendChild(th0);
  C.forEach((c,i)=>{
    const th=document.createElement("th");
    if(i===0)th.classList.add("name-col");
    th.innerHTML=escHtml(c)+(i===sortCol?('<span class="ar">'+(sortAsc?"\u25B2":"\u25BC")+'</span>'):"");
    if(i===sortCol)th.classList.add("sorted");
    th.addEventListener("click",()=>{
      sortAsc=(sortCol===i)?!sortAsc:true;
      sortCol=i;page=0;recompute();
    });
    if(i===0){
      const rz=document.createElement("div");rz.className="name-resizer";
      rz.title="Drag to resize \u00B7 double-click to auto-fit";
      rz.addEventListener("mousedown",startNameResize);
      rz.addEventListener("dblclick",e=>{e.stopPropagation();nameWidthManual=null;autofitNameCol();});
      rz.addEventListener("click",e=>e.stopPropagation());
      th.appendChild(rz);
    }
    tr.appendChild(th);
  });
  const head=document.getElementById("tableHead");
  head.innerHTML="";head.appendChild(tr);
}

function recompute(){
  const active=FILTER_MAP.map(f=>({
    q:document.getElementById(f.input).value.trim().toLowerCase(),
    ix:f.cols.map(c=>IDX[c]).filter(i=>i!==undefined)
  })).filter(f=>f.q);
  const gq=document.getElementById("gsearch").value.trim().toLowerCase();

  view=[];
  for(let r=0;r<R.length;r++){
    let ok=true;
    for(const f of active){
      let hit=false;
      for(const i of f.ix){
        const v=R[r][i];
        if(v!==null&&(''+v).toLowerCase().includes(f.q)){hit=true;break;}
      }
      if(!hit){ok=false;break;}
    }
    if(ok&&gq){
      let hit=false;
      const row=R[r];
      for(let i=0;i<row.length;i++){
        const v=row[i];
        if(v!==null&&(''+v).toLowerCase().includes(gq)){hit=true;break;}
      }
      if(!hit)ok=false;
    }
    if(ok)view.push(r);
  }

  const t=T[sortCol], ci=sortCol, dir=sortAsc?1:-1;
  const key = t==="num"
    ? (r)=>{const v=R[r][ci];return v===null?null:+v;}
    : t==="date"
      ? (r)=>{const v=R[r][ci];if(!v)return null;const d=new Date(v);return isNaN(d)?null:d.getTime();}
      : (r)=>{const v=R[r][ci];return v===null?null:(''+v).toLowerCase();};
  view.sort((a,b)=>{
    const ka=key(a),kb=key(b);
    if(ka===null&&kb===null)return 0;
    if(ka===null)return 1;
    if(kb===null)return -1;
    return ka<kb?-dir:(ka>kb?dir:0);
  });

  buildHead();
  render();
  autofitNameCol();
  paginate();
  document.getElementById("resultCount").innerHTML=`<strong>${view.length.toLocaleString()}</strong> properties`;
  document.getElementById("pageInfo").textContent=`Page ${page+1} of ${Math.ceil(view.length/PAGE_SIZE)||1}`;

  /* stat strip: live totals for the current filtered view */
  const uix=IDX["Total Units"];
  let units=0;
  if(uix!==undefined)for(const r of view){const v=R[r][uix];if(v!==null&&!isNaN(+v))units+=+v;}
  document.getElementById("statProps").textContent=view.length.toLocaleString();
  document.getElementById("statUnits").textContent=units.toLocaleString();

  mapStale=true;
  if(VIEW_MODE==="map"&&MAP)buildMarkers();
}

function disp(colIx,v){
  if(v===null||v===undefined||v==="")return"";
  const c=C[colIx];
  if(T[colIx]==="num"){
    const f=+v;
    if(isNaN(f))return""+v;
    if(c===RATIO)return (f*100).toFixed(2)+"%";
    if(INTC.has(c))return f.toLocaleString("en-US",{maximumFractionDigits:0});
    return f.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:2});
  }
  return""+v;
}

/* ── Property Name column width ─────────────────────────────────────
   Auto-fits the longest name on the visible page. Drag the header's
   right edge to override; double-click the edge to re-enable auto. */
let nameWidthManual=null;
const _measureCtx=document.createElement("canvas").getContext("2d");
function autofitNameCol(){
  const table=document.getElementById("mainTable");
  if(nameWidthManual!==null){table.style.setProperty("--namew",nameWidthManual+"px");return;}
  _measureCtx.font="600 12.5px 'Libre Franklin', sans-serif";
  let w=0;
  const start=page*PAGE_SIZE, slice=view.slice(start,start+PAGE_SIZE);
  const cix=IDX["Contract Number"], pix=IDX["Property ID"];
  for(const ri of slice){
    const v=R[ri][0];
    if(v===null)continue;
    let extra=0;
    if(cix!==undefined&&R[ri][cix]&&TIERS[R[ri][cix]])extra+=26;
    if(pix!==undefined&&R[ri][pix]!==null&&(PROP_N[R[ri][pix]]||0)>1)extra+=34;
    w=Math.max(w,_measureCtx.measureText(''+v).width+extra);
  }
  _measureCtx.font="800 10px 'Libre Franklin', sans-serif";
  w=Math.max(w,_measureCtx.measureText((C[0]||"").toUpperCase()).width*1.12+16);
  const px=Math.min(440,Math.max(140,Math.ceil(w)+24));
  table.style.setProperty("--namew",px+"px");
}
function startNameResize(e){
  e.preventDefault();e.stopPropagation();
  const table=document.getElementById("mainTable");
  const startX=e.clientX;
  const startW=parseInt(getComputedStyle(table).getPropertyValue("--namew"))||220;
  const rz=e.target;rz.classList.add("active");
  document.body.style.cursor="col-resize";
  document.body.style.userSelect="none";
  function move(ev){
    nameWidthManual=Math.min(600,Math.max(120,startW+(ev.clientX-startX)));
    table.style.setProperty("--namew",nameWidthManual+"px");
  }
  function up(){
    rz.classList.remove("active");
    document.body.style.cursor="";document.body.style.userSelect="";
    document.removeEventListener("mousemove",move);
    document.removeEventListener("mouseup",up);
  }
  document.addEventListener("mousemove",move);
  document.addEventListener("mouseup",up);
}

const CI=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
const CK=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function render(){
  const tb=document.getElementById("tableBody");tb.innerHTML="";
  const start=page*PAGE_SIZE, slice=view.slice(start,start+PAGE_SIZE);
  if(!slice.length){
    const tr=document.createElement("tr"),td=document.createElement("td");
    td.colSpan=C.length+1;
    td.innerHTML=`<div class="empty-state">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/>
        <path d="M9 9h1.5M13.5 9H15M9 12.5h1.5M13.5 12.5H15M9 16h1.5M13.5 16H15"/>
      </svg>
      <div class="es-title">No properties match</div>
      <div class="es-sub">Try widening your search or removing a filter.</div>
      <button id="esClear">Clear all filters</button>
    </div>`;
    tr.appendChild(td);tb.appendChild(tr);
    document.getElementById("esClear").onclick=()=>document.getElementById("resetBtn").click();
    return;
  }
  const animate=slice.length<=200;
  slice.forEach((ri,i)=>{
    const row=R[ri];
    const tr=document.createElement("tr");
    if(animate){tr.className="animate-in";tr.style.animationDelay=(i*.015)+"s";}
    const ct=document.createElement("td");ct.className="copy-col";
    const aw=document.createElement("div");aw.className="act-wrap";
    const btn=document.createElement("button");btn.className="copy-btn";btn.innerHTML=CI;btn.title="Copy row";
    btn.onclick=()=>copyRow(ri,btn,tr);aw.appendChild(btn);
    const rrb=document.createElement("button");rrb.className="rr-btn";rrb.textContent="RR";
    rrb.title="Create rent roll (RedIQ/Radix-ready) for this property";
    rrb.onclick=()=>createRentRoll(ri);aw.appendChild(rrb);
    ct.appendChild(aw);tr.appendChild(ct);
    const cno=IDX["Contract Number"]!==undefined?row[IDX["Contract Number"]]:null;
    const pid=IDX["Property ID"]!==undefined?row[IDX["Property ID"]]:null;
    const nContracts=pid!==null&&pid!==undefined?(PROP_N[pid]||0):0;
    if((cno&&TIERS[cno])||nContracts>1)tr.classList.add("hl-row");
    for(let cix=0;cix<C.length;cix++){
      const td=document.createElement("td");
      const v=disp(cix,row[cix]);
      if(T[cix]==="num")td.classList.add("is-num");
      if(cix===0){
        td.classList.add("name-col");
        td.title=v;
        const wrap=document.createElement("div");wrap.className="pn-wrap";
        const tx=document.createElement("span");tx.className="pn-text";tx.textContent=v;
        wrap.appendChild(tx);
        if(cno&&TIERS[cno]){
          const fb=document.createElement("button");
          fb.className="tier-flag";
          fb.title="Multiple rent/UA tiers \u2014 click for breakdown";
          fb.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>';
          fb.onclick=(e)=>{e.stopPropagation();openTiers(cno,''+(row[0]??""));};
          wrap.appendChild(fb);
        }
        if(nContracts>1){
          const mb=document.createElement("button");
          mb.className="multi-badge";
          mb.textContent="\u00D7"+nContracts;
          mb.title="This Property ID has "+nContracts+" contracts in the database \u2014 click to see them all";
          mb.onclick=(e)=>{
            e.stopPropagation();
            document.getElementById("gsearch").value=''+pid;
            page=0;recompute();
          };
          wrap.appendChild(mb);
        }
        td.appendChild(wrap);
      }else{
        td.textContent=v;td.title=v;
      }
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  });
}

function particles(btn){
  const r=btn.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  ["#081937","#162f5e","#0d2347","#ffffff","#c4cde0","#081937"].forEach((col,i)=>{
    const p=document.createElement("div");p.className="particle";
    const a=(Math.PI*2*i)/6,d=18+Math.random()*22;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${3+Math.random()*4}px;height:${3+Math.random()*4}px;background:${col};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d-10}px;animation:particleFly ${.4+Math.random()*.25}s ease-out forwards;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),800);
  });
}
function copyRow(ri,btn,tr){
  const row=R[ri];
  const t=C.map((c,i)=>{
    const v=disp(i,row[i]);
    return(v.includes("\t")||v.includes("\n")||v.includes('"'))?'"'+v.replace(/"/g,'""')+'"':v;
  }).join("\t");
  navigator.clipboard.writeText(t).then(()=>{
    btn.innerHTML=CK;btn.classList.add("success");particles(btn);
    tr.classList.remove("copied");void tr.offsetWidth;tr.classList.add("copied");
    setTimeout(()=>{btn.innerHTML=CI;btn.classList.remove("success");tr.classList.remove("copied");},2000);
  });
}

/* Formatted export: Excel Table, navy bold header, typed columns
   (real dates, thousands separators, ratio as %), auto-fit widths,
   frozen header row. */
function excelDate(v){ /* "MM/DD/YYYY" -> Date at UTC midnight (no TZ shift) */
  const m=(''+v).split("/");
  if(m.length!==3)return null;
  const d=new Date(Date.UTC(+m[2],+m[0]-1,+m[1]));
  return isNaN(d)?null:d;
}
document.getElementById("exportBtn").onclick=async()=>{
  if(!view.length)return;
  if(view.length>5000&&!confirm("Export all "+view.length.toLocaleString()+" filtered rows? Large exports can take ~20-40 seconds to build in the browser."))return;
  setStatus("Building formatted export ("+view.length.toLocaleString()+" rows)\u2026");
  await new Promise(r=>setTimeout(r,50));
  try{
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet("HAP",{views:[{state:"frozen",ySplit:1}]});
    const XC=[...C,"Rent Tier"];   /* export columns = table columns + tier label */

    /* typed column definitions (number formats) must precede the data */
    ws.columns=XC.map((c,i)=>({
      key:"c"+i,
      style: i<C.length&&T[i]==="date" ? {numFmt:"m/d/yyyy"}
           : i<C.length&&T[i]==="num"  ? {numFmt:(c===RATIO?"0.00%":"#,##0")}
           : {}
    }));

    /* typed rows — flagged contracts expand into one row per rent tier:
       tier k carries the k-th rent/UA/unit-count per bedroom size (HUD
       source order, so tier 1 == the master's displayed rents), every
       other column repeats, and a final "Rent Tier" column labels them. */
    const bedKey=b=>{const n=+b;return n>=5?"5BR+":(n+"BR");};
    const cnoIx=IDX["Contract Number"];
    const typed=(i,v)=>{
      if(v===null||v===undefined||v==="")return null;
      if(T[i]==="num"){const f=+v;return isNaN(f)?(''+v):f;}
      if(T[i]==="date"){const d=excelDate(v);return d||(''+v);}
      return ''+v;
    };
    const rows=[];
    for(const ri of view){
      const base=C.map((c,i)=>typed(i,R[ri][i]));
      const cno=cnoIx!==undefined?R[ri][cnoIx]:null;
      const tiers=cno?TIERS[cno]:null;
      if(!tiers){rows.push([...base,null]);continue;}
      /* group tier rows by bedroom size, preserving source order */
      const byBed={};
      for(const t of tiers){
        if(t[0]===null||t[0]===undefined)continue;
        (byBed[bedKey(t[0])]=byBed[bedKey(t[0])]||[]).push(t);
      }
      const n=Math.max(1,...Object.values(byBed).map(a=>a.length));
      for(let k=0;k<n;k++){
        const r=[...base,(k+1)+" of "+n];
        for(const bk in byBed){
          const ri2=IDX[bk+" Rent"],ui2=IDX[bk+" UA"],qi2=IDX[bk+" Units"];
          const t=byBed[bk][k];
          if(t){ if(ri2!==undefined)r[ri2]=t[2]; if(ui2!==undefined)r[ui2]=t[4]; if(qi2!==undefined)r[qi2]=t[1]; }
          else { if(ri2!==undefined)r[ri2]=null; if(ui2!==undefined)r[ui2]=null; if(qi2!==undefined)r[qi2]=null; }
        }
        rows.push(r);
      }
    }

    /* a real Excel Table with filter buttons and row stripes */
    ws.addTable({
      name:"HAPData", ref:"A1",
      headerRow:true, totalsRow:false,
      style:{theme:"TableStyleMedium2", showRowStripes:true},
      columns:XC.map(c=>({name:c,filterButton:true})),
      rows
    });

    /* auto-fit widths (sampled for speed on huge exports) */
    const sample=Math.min(rows.length,1500);
    XC.forEach((c,i)=>{
      let w=c.length+3;  /* room for the filter button */
      for(let r2=0;r2<sample;r2++){
        const v=rows[r2][i];
        if(v==null)continue;
        const s2=(v instanceof Date)?"00/00/0000"
               :(typeof v==="number")?v.toLocaleString("en-US",{maximumFractionDigits:2})
               :''+v;
        if(s2.length>w)w=s2.length;
      }
      ws.getColumn(i+1).width=Math.min(Math.max(w+2,10),48);
    });

    /* navy, bold header */
    const hdr=ws.getRow(1);
    hdr.height=20;
    hdr.eachCell(cell=>{
      cell.font={bold:true,color:{argb:"FFFFFFFF"},size:11,name:"Calibri"};
      cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF081937"}};
      cell.alignment={vertical:"middle"};
    });

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    const stamp=new Date().toISOString().slice(0,10);
    a.download="HAP_Export_"+stamp+".xlsx";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    setStatus("",false);
  }catch(e){
    setStatus("Export failed: "+e.message);
  }
};

function paginate(){
  const tp=Math.ceil(view.length/PAGE_SIZE),bar=document.getElementById("paginationBar");
  if(tp<=1){bar.innerHTML="";return;}
  let h=`<button ${page===0?"disabled":""} onclick="go(${page-1})">&#8592;</button>`;
  const s=Math.max(0,page-2),e=Math.min(tp-1,page+2);
  if(s>0)h+=`<button onclick="go(0)">1</button>`;
  if(s>1)h+=`<span class="ellipsis">\u2026</span>`;
  for(let p=s;p<=e;p++)h+=`<button class="${p===page?"active":""}" onclick="go(${p})">${p+1}</button>`;
  if(e<tp-2)h+=`<span class="ellipsis">\u2026</span>`;
  if(e<tp-1)h+=`<button onclick="go(${tp-1})">${tp}</button>`;
  h+=`<button ${page>=tp-1?"disabled":""} onclick="go(${page+1})">&#8594;</button>`;
  bar.innerHTML=h;
}
function go(p){page=p;render();autofitNameCol();paginate();
  document.getElementById("pageInfo").textContent=`Page ${page+1} of ${Math.ceil(view.length/PAGE_SIZE)||1}`;
  window.scrollTo({top:0,behavior:"smooth"});}

/* ── Update button ─────────────────────────────────────────────────
   With UPDATE_ENDPOINT set: POST to the relay, which starts the
   GitHub Action running the unchanged HAP updater; then watch the
   run through GitHub's public API and swap in the new data when it
   lands. Without it: open the Run-workflow page (login required). */
const statusEl=document.getElementById("statusStrip");
let tickInt=null;
function setStatus(msg,show=true){
  if(tickInt){clearInterval(tickInt);tickInt=null;}
  statusEl.textContent=msg;statusEl.style.display=show?"block":"none";
}
/* Status line with a live elapsed clock against a goal, e.g.
   "Engine running…  —  1:23 elapsed · goal 4:00"                    */
function fmtClock(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+":"+String(ss).padStart(2,"0");}
function setStatusClock(msg,startMs,goalSec){
  if(tickInt){clearInterval(tickInt);tickInt=null;}
  const draw=()=>{
    const el=Math.max(0,(Date.now()-startMs)/1000);
    const over=el>goalSec?" (running a little long - that's OK)":"";
    statusEl.textContent=msg+"  \u2014  "+fmtClock(el)+" elapsed \u00B7 goal "+fmtClock(goalSec)+over;
    statusEl.style.display="block";
  };
  draw();tickInt=setInterval(draw,1000);
}

document.getElementById("updateBtn").onclick=async function(){
  const repo=ghRepo();
  if(!UPDATE_ENDPOINT){
    if(repo)window.open(`https://github.com/${repo}/actions/workflows/update.yml`,"_blank");
    setStatus("A GitHub tab just opened - click the grey 'Run workflow' button there (requires a GitHub login with repo access). The rebuild takes ~5-10 minutes; refresh this page afterwards.");
    return;
  }
  const btn=this;btn.disabled=true;
  const triggered=Date.now();
  setStatusClock("Requesting update\u2026 pulling this month's HUD files and rebuilding. You can leave this tab open.",triggered,240);
  try{
    const r=await fetch(UPDATE_ENDPOINT,{method:"POST"});
    const j=await r.json().catch(()=>({}));
    if(!r.ok||j.ok===false)throw new Error(j.error||("relay returned "+r.status));
    if(repo)await watchRun(repo,triggered);
    else setStatus("Update started. Refresh this page in ~10 minutes.");
  }catch(e){
    setStatus("Update failed to start: "+e.message);
  }
  btn.disabled=false;
};

async function watchRun(repo,triggered){
  const api=`https://api.github.com/repos/${repo}/actions/workflows/update.yml/runs?per_page=1`;
  const t0=Date.now();
  /* STAGE 1 - the rebuild itself. Goal: 4 minutes. */
  while(Date.now()-t0<25*60*1000){
    await new Promise(r=>setTimeout(r,20000));
    try{
      const res=await fetch(api,{cache:"no-store"});
      if(!res.ok)continue;
      const j=await res.json();
      const run=(j.workflow_runs||[])[0];
      if(!run||new Date(run.created_at).getTime()<triggered-90000)
        {setStatusClock("Update requested - waiting for the engine to start\u2026",triggered,240);continue;}
      if(run.status!=="completed")
        {setStatusClock("Engine running: downloading HUD files and rebuilding the master table\u2026",triggered,240);continue;}
      if(run.conclusion!=="success"){setStatus("The update run finished with status: "+run.conclusion+". Check the Actions tab on GitHub for details.");return;}
      break;
    }catch(e){}
  }
  /* Rebuild done. If the data was already current today, nothing will
     change on the site - say so instead of waiting for a change.      */
  const oldAsof=ASOF;
  const today=new Date().toISOString().slice(0,10);
  if(oldAsof===today){
    setStatus("\u2713 Done - the database was already current as of "+today+", so nothing changed this run.");
    return;
  }
  /* STAGE 2 - GitHub Pages publishing the new data. Goal: 2 minutes. */
  const pubStart=Date.now();
  setStatusClock("Rebuild finished \u2713 - publishing the new data\u2026",pubStart,120);
  for(let i=0;i<12;i++){
    await new Promise(r=>setTimeout(r,20000));
    setStatusClock("Rebuild finished \u2713 - publishing the new data\u2026",pubStart,120);
    try{
      const res=await fetch("hap_state.json?v="+Date.now(),{cache:"no-store"});
      if(!res.ok)continue;
      const d=await res.json();
      if(d.asof&&d.asof!==oldAsof){await Promise.all([loadTiers(),loadCoords()]);applyData(d);setStatus("\u2713 Updated. Data is now current as of "+d.asof+".");return;}
    }catch(e){}
  }
  setStatus("Rebuild finished \u2713 - refresh this page in a minute to see the new data.");
}

/* ── Map ─────────────────────────────────────────────────────────────
   Lazily initialised on first switch. Shows the CURRENT filtered view
   as clustered markers; rebuilt whenever filters/sort change while the
   map is visible (or on switch if stale). */
function ensureMap(){
  if(MAP)return;
  MAP=L.map("mapCanvas",{preferCanvas:true}).setView([39.3,-96.5],4);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:"abcd",maxZoom:19
  }).addTo(MAP);
  CLUSTER=L.markerClusterGroup({
    chunkedLoading:true,
    /* cluster aggressively when zoomed out, back off as you zoom in,
       and stop clustering entirely from zoom 14 - individual dots only */
    maxClusterRadius:(z)=>z<8?60:z<11?45:z<13?30:15,
    disableClusteringAtZoom:14,
    spiderfyOnMaxZoom:true,
    iconCreateFunction:function(c){
      const n=c.getChildCount();
      const sz=n<25?[30,"gc-s"]:n<250?[38,"gc-m"]:[46,"gc-l"];
      return L.divIcon({html:'<div class="gc-cluster '+sz[1]+'" style="width:'+sz[0]+'px;height:'+sz[0]+'px">'+n.toLocaleString()+'</div>',
                        className:"",iconSize:[sz[0],sz[0]]});
    }
  });
  MAP.addLayer(CLUSTER);
}
function popupHtml(ri){
  const row=R[ri];
  const g=(c)=>{const i=IDX[c];return i===undefined?null:row[i];};
  const cno=g("Contract Number");
  const kv=(k,v)=>v===null||v===undefined||v===""?"":'<span class="k">'+k+'</span><span class="v">'+escHtml(''+v)+'</span>';
  const ratio=g("Rent-to-FMR Ratio");
  let h='<div class="pp-name">'+escHtml(''+(row[0]||"Property"))+'</div>'
    +'<div class="pp-sub">'+escHtml([g("City"),g("State")].filter(Boolean).join(", "))+' \u00B7 '+escHtml(''+(cno||""))+'</div>'
    +'<div class="pp-grid">'
    +kv("Total Units",g("Total Units")!==null?(+g("Total Units")).toLocaleString():null)
    +kv("Rent-to-FMR",ratio!==null?(ratio*100).toFixed(2)+"%":null)
    +kv("HAP Expires",g("HAP Expiration Date"))
    +kv("Program",g("Program Type"))
    +'</div>';
  if(cno&&TIERS[cno])h+='<button class="pp-tier" onclick="openTiersFromRow('+ri+')">View rent tiers ('+TIERS[cno].length+')</button>';
  h+='<button class="pp-table" onclick="showInTable('+ri+')">Show in table</button>';
  return h;
}
function showInTable(ri){

function openTiersFromRow(ri){

  const cno=IDX["Contract Number"]!==undefined?row[IDX["Contract Number"]]:null;

function buildMarkers(){
  if(!MAP)return;
  CLUSTER.clearLayers();
  const ms=[];let mapped=0;
  const pix=IDX["Property ID"],cix=IDX["Contract Number"];
  const seen={};   /* pid -> how many markers already placed at that spot */
  for(const ri of view){
    const pid=pix!==undefined?R[ri][pix]:null;
    const c=pid!==null&&pid!==undefined?COORDS[pid]:null;
    if(!c)continue;
    mapped++;
    let lat=c[0],lon=c[1];
    const k=seen[pid]=(seen[pid]||0)+1;
    if(k>1){ /* 2nd+ contract at the same property: nudge ~15m in a ring */
      const ang=(k-1)*2.4;                     /* golden-angle spacing */
      const rr=0.00014;
      lat+=rr*Math.cos(ang);
      lon+=rr*Math.sin(ang)/Math.max(.2,Math.cos(lat*Math.PI/180));
    }
    const cno=cix!==undefined?R[ri][cix]:null;
    const flagged=cno&&TIERS[cno];
    const m=L.circleMarker([lat,lon],{radius:6,weight:1.5,color:"#081937",
      fillColor:flagged?"#e08a3c":"#3B7F83",fillOpacity:.85});
    m.bindPopup(()=>popupHtml(ri),{maxWidth:300});
    ms.push(m);
  }
  CLUSTER.addLayers(ms);
  document.getElementById("mapInfo").textContent=
    mapped.toLocaleString()+" of "+view.length.toLocaleString()+" properties mapped";
  if(ms.length){try{MAP.fitBounds(CLUSTER.getBounds().pad(0.08),{maxZoom:11});}catch(e){}}
  mapStale=false;
}
function setViewMode(m){
  VIEW_MODE=m;
  const isMap=m==="map";
  document.getElementById("modeTable").classList.toggle("active",!isMap);
  document.getElementById("modeMap").classList.toggle("active",isMap);
  document.getElementById("mapWrap").style.display=isMap?"block":"none";
  document.querySelector(".table-wrap").style.display=isMap?"none":"block";
  document.getElementById("paginationBar").style.display=isMap?"none":"flex";
  document.getElementById("scrollBar").style.display=isMap?"none":"flex";
  if(isMap){
    ensureMap();
    setTimeout(()=>{MAP.invalidateSize();if(mapStale)buildMarkers();},60);
  }
}
document.getElementById("modeTable").onclick=()=>setViewMode("table");
document.getElementById("modeMap").onclick=()=>setViewMode("map");

/* ── Create Rent Roll ────────────────────────────────────────────────
   Un-pivots the HAP rent schedule into one row per unit for the WHOLE
   property (all contracts, Contract Number column), in the Radix/RedIQ
   capture layout: Unit | Floor Plan | Net SF | Beds | Baths | Unit Type |
   Lease Type | Occupancy | Market Rent | Contractual Rent + UA / Gross /
   FMR / Contract. Lease Type = Subsidized (HAP). Second tab = tie-out. */
async function createRentRoll(ri){
  const pix=IDX["Property ID"],cix=IDX["Contract Number"];
  const pid=pix!==undefined?R[ri][pix]:null;
  if(pid===null||pid===undefined){setStatus("This row has no Property ID - cannot build a rent roll.");return;}
  const mrows=[];for(let i=0;i<R.length;i++)if(R[i][pix]===pid)mrows.push(i);
  const propName=''+(R[mrows[0]][0]||"Property");
  setStatus("Building rent roll for "+propName+"\u2026");
  await new Promise(r=>setTimeout(r,50));
  try{
    /* 1) schedule lines: {bed, bedLabel, count, rent, ua, fmr, cno, tier} */
    const sched=[];
    for(const mi of mrows){
      const cno=cix!==undefined?R[mi][cix]:null;
      const t=cno?TIERS[cno]:null;
      if(t){
        const tcount={};
        for(const row of t){
          if(row[0]===null||row[0]===undefined)continue;
          const cnt=row[1]===null?0:Math.round(+row[1]);
          if(cnt<=0)continue;
          const bed=+row[0];
          tcount[bed]=(tcount[bed]||0)+1;
          sched.push({bed:bed,bedLabel:bed+"BR",count:cnt,rent:row[2],ua:row[4],fmr:row[3],cno:cno,tier:tcount[bed]});
        }
      }else{
        const bks=[["0BR",0],["1BR",1],["2BR",2],["3BR",3],["4BR",4],["5BR+",5]];
        for(const [bk,bn] of bks){
          const u=R[mi][IDX[bk+" Units"]];
          if(u===null||u===undefined||+u<=0)continue;
          sched.push({bed:bn,bedLabel:bk,count:Math.round(+u),rent:R[mi][IDX[bk+" Rent"]],ua:R[mi][IDX[bk+" UA"]],fmr:null,cno:cno,tier:1});
        }
      }
    }
    if(!sched.length){setStatus("No unit-mix data available for "+propName+" - HUD's rents file has no rows for its contract(s).");return;}
    sched.sort((a,b)=>a.bed-b.bed||(''+a.cno).localeCompare(''+b.cno)||a.tier-b.tier);
    const tiersPerBed={};sched.forEach(x=>{tiersPerBed[x.bedLabel]=Math.max(tiersPerBed[x.bedLabel]||0,x.tier);});

    /* 2) un-pivot to units */
    const seq={};const units=[];
    for(const x of sched){
      const fp=x.bedLabel+" - HAP"+((tiersPerBed[x.bedLabel]>1)?(" T"+x.tier):"");
      const tenant=x.rent===null?null:Math.min(1,+x.rent);
      const subsidy=x.rent===null?null:(+x.rent-tenant);
      for(let k=0;k<x.count;k++){
        const n=seq[x.bedLabel]=(seq[x.bedLabel]||0)+1;
        units.push([x.bedLabel.replace("+","p")+"-"+String(n).padStart(3,"0"),
          fp,null,x.bed,1,"Residential",null,"Occupied",null,tenant,subsidy]);
      }
    }

    /* 3) workbook */
    const HDR=["Unit","Floor Plan","Net SF","Beds","Baths","Unit Type","Lease Type",
               "Occupancy","Market Rent","Tenant Rent","Subsidy Rent"];
    const NUMFMT={3:"0",4:"0",8:"#,##0",9:"#,##0",10:"#,##0"};
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet("Rent Roll",{views:[{state:"frozen",ySplit:5}]});
    const stamp=new Date().toISOString().slice(0,10);
    ws.getCell("A1").value=propName;
    ws.getCell("A1").font={bold:true,size:14,color:{argb:"FF081937"}};
    const city=[R[mrows[0]][IDX["City"]],R[mrows[0]][IDX["State"]]].filter(Boolean).join(", ");
    ws.getCell("A2").value=city+"  \u00B7  Property ID "+pid+"  \u00B7  Contract(s): "+mrows.map(i=>R[i][cix]).filter(Boolean).join(", ");
    ws.getCell("A3").value="Synthetic rent roll un-pivoted from HUD Section 8 contract rent schedule (contractsrentutilityamt) \u00B7 data as of "+ASOF+" \u00B7 generated "+stamp+" \u00B7 all assisted units shown as Occupied \u00B7 contract rent split as Tenant Rent $1 + Subsidy Rent (contract rent \u2212 $1)";
    ws.getCell("A3").font={size:9,italic:true,color:{argb:"FF6B7FA0"}};
    ws.getRow(5).values=HDR;
    ws.getRow(5).font={bold:true,color:{argb:"FFFFFFFF"},size:11};
    ws.getRow(5).eachCell(c=>{c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF081937"}};c.alignment={vertical:"middle"};});
    ws.getRow(5).height=20;
    for(const u of units)ws.addRow(u);
    HDR.forEach((h,i)=>{
      const col=ws.getColumn(i+1);
      if(NUMFMT[i])col.numFmt=NUMFMT[i];
      let w=h.length+3;
      for(const u of units.slice(0,500)){const v=u[i];if(v!==null&&(''+v).length>w)w=(''+v).length;}
      col.width=Math.min(Math.max(w+2,9),34);
    });
    ws.autoFilter={from:{row:5,column:1},to:{row:5,column:HDR.length}};

    /* 4) tie-out tab */
    const ws2=wb.addWorksheet("Tie-Out");
    ws2.getCell("A1").value="Tie-Out Check \u2014 "+propName;
    ws2.getCell("A1").font={bold:true,size:12,color:{argb:"FF081937"}};
    ws2.getRow(3).values=["Floor Plan","Contract","Units","Contract Rent","Monthly Total"];
    ws2.getRow(3).font={bold:true,color:{argb:"FFFFFFFF"}};
    ws2.getRow(3).eachCell(c=>{c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF081937"}};});
    let totU=0,totM=0,r0=4;
    for(const x of sched){
      const fp=x.bedLabel+" - HAP"+((tiersPerBed[x.bedLabel]>1)?(" T"+x.tier):"");
      const m=(x.rent!==null?x.count*+x.rent:null);
      ws2.getRow(r0++).values=[fp,''+(x.cno||""),x.count,x.rent,m];
      totU+=x.count;if(m!==null)totM+=m;
    }
    const tr2=ws2.getRow(r0);
    tr2.values=["TOTAL","",totU,null,totM];tr2.font={bold:true};
    const masterTot=mrows.reduce((a,i)=>a+(R[i][IDX["Total Units"]]!==null?+R[i][IDX["Total Units"]]:0),0);
    ws2.getCell(r0+2,1).value="Rent roll unit rows: "+units.length.toLocaleString()+"   \u00B7   Schedule units: "+totU.toLocaleString()
      +"   \u00B7   Master 'Total Units' (all contracts): "+masterTot.toLocaleString()
      +"   \u00B7   "+(units.length===totU?(totU===masterTot?"TIES":"note: master Total Units differs (separate HUD field)"):"MISMATCH");
    [22,16,9,16,14].forEach((w,i)=>ws2.getColumn(i+1).width=w);
    ws2.getColumn(4).numFmt="#,##0";ws2.getColumn(5).numFmt="#,##0";

    /* 5) utility allowance summary (3rd sheet) */
    const ws3=wb.addWorksheet("Utility Allowances");
    ws3.getCell("A1").value="Utility Allowance Summary \u2014 "+propName;
    ws3.getCell("A1").font={bold:true,size:12,color:{argb:"FF081937"}};
    ws3.getCell("A2").value="Per-unit monthly utility allowances by floor plan, from HUD's contract rent schedule (data as of "+ASOF+")";
    ws3.getCell("A2").font={size:9,italic:true,color:{argb:"FF6B7FA0"}};
    ws3.getRow(4).values=["Floor Plan","Contract","Units","Utility Allowance","Monthly UA Total"];
    ws3.getRow(4).font={bold:true,color:{argb:"FFFFFFFF"}};
    ws3.getRow(4).eachCell(c=>{c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF081937"}};});
    let r3=5,uaTotU=0,uaTotM=0;
    for(const x of sched){
      const fp=x.bedLabel+" - HAP"+((tiersPerBed[x.bedLabel]>1)?(" T"+x.tier):"");
      const m=(x.ua!==null?x.count*+x.ua:null);
      ws3.getRow(r3++).values=[fp,''+(x.cno||""),x.count,x.ua,m];
      uaTotU+=x.count;if(m!==null)uaTotM+=m;
    }
    const trU=ws3.getRow(r3);
    trU.values=["TOTAL","",uaTotU,null,uaTotM];trU.font={bold:true};
    [22,16,9,17,16].forEach((w,i)=>ws3.getColumn(i+1).width=w);
    ws3.getColumn(4).numFmt="#,##0";ws3.getColumn(5).numFmt="#,##0";

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=propName.replace(/[^A-Za-z0-9 ]+/g,"").trim().replace(/ +/g,"_")+"_RentRoll_"+stamp+".xlsx";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    setStatus("\u2713 Rent roll created: "+units.length.toLocaleString()+" units across "+mrows.length+" contract"+(mrows.length>1?"s":"")+".");
  }catch(e){
    setStatus("Rent roll failed: "+e.message);
  }
}

/* ── Multi-tier popup ── */
function bedLabel(b){
  if(b===null||b===undefined)return"\u2014";
  const n=+b;
  if(n===0)return"Studio";
  if(n>=5)return"5+ BR";
  return n+" BR";
}
const money=v=>v===null||v===undefined?"\u2014":"$"+(+v).toLocaleString("en-US");
function openTiers(contract,propName){
  /* display copy sorted by bedroom; the underlying array stays in HUD
     source order (the export logic depends on it) */
  const rows=(TIERS[contract]||[]).slice()
    .sort((a,b)=>(a[0]===null?99:+a[0])-(b[0]===null?99:+b[0]));
  const ov=document.createElement("div");ov.className="modal-overlay";
  const distinct={}; /* bedroom sizes whose rents actually differ */
  rows.forEach(r=>{const k=''+r[0];(distinct[k]=distinct[k]||new Set()).add(r[2]);});
  const body=rows.map(r=>{
    const differs=distinct[''+r[0]]&&distinct[''+r[0]].size>1;
    return `<tr>
      <td class="br-lead">${bedLabel(r[0])}${differs?'':''}</td>
      <td class="tn">${r[1]===null?"\u2014":(+r[1]).toLocaleString()}</td>
      <td class="tn">${money(r[2])}</td>
      <td class="tn">${money(r[3])}</td>
      <td class="tn">${money(r[4])}</td>
    </tr>`;}).join("");
  ov.innerHTML=`<div class="modal-card">
    <div class="modal-head">
      <div>
        <div class="mh-title">${escHtml(propName||"Property")}</div>
        <div class="mh-sub">Contract ${escHtml(contract)} \u00B7 Rent &amp; UA tier breakdown</div>
      </div>
      <button class="modal-close" title="Close">\u2715</button>
    </div>
    <div class="modal-body">
      <table class="tier-table">
        <thead><tr><th>Bedroom</th><th style="text-align:right">Units</th><th style="text-align:right">Contract Rent</th><th style="text-align:right">FMR</th><th style="text-align:right">Utility Allow.</th></tr></thead>
        <tbody>${body}</tbody>
      </table>
      <div class="tier-note">This contract reports more than one row for at least one bedroom size in HUD's rents file \u2014 typically separate assistance tiers or stages. The main table shows the first-listed rent per size; unit counts there are the sum of all tiers.</div>
    </div>
  </div>`;
  function close(){ov.remove();document.removeEventListener("keydown",esc);}
  function esc(e){if(e.key==="Escape")close();}
  ov.addEventListener("click",e=>{if(e.target===ov)close();});
  ov.querySelector(".modal-close").onclick=close;
  document.addEventListener("keydown",esc);
  document.body.appendChild(ov);
}

(function(){
  const SEQ=["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","KeyB","KeyA","Enter"];
  let buf=[];
  document.addEventListener("keydown",(e)=>{
    const t=e.target;
    if(t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.tagName==="SELECT"))return;
    const code=e.code==="NumpadEnter"?"Enter":e.code;
    buf.push(code);
    if(buf.length>SEQ.length)buf=buf.slice(-SEQ.length);
    if(buf.length===SEQ.length&&buf.every((c,i)=>c===SEQ[i])){buf=[];konamiReveal();}
  });
  function konamiReveal(){
    if(document.querySelector(".konami-overlay"))return;
    const ov=document.createElement("div");ov.className="konami-overlay";
    ov.innerHTML='<div class="konami-title">Chuck-E-Choke</div>'
      +'<img class="konami-img" src="'+KONAMI_IMG+'" alt=""/>'
      +'<div class="konami-cap">\u2191\u2191\u2193\u2193\u2190\u2192\u2190\u2192 B A START</div>';
    const close=()=>{ov.remove();document.removeEventListener("keydown",esc);};
    const esc=(e)=>{if(e.key==="Escape")close();};
    ov.addEventListener("click",close);
    document.addEventListener("keydown",esc);
    document.body.appendChild(ov);
    /* celebratory burst around the portrait */
    setTimeout(()=>{
      const img=ov.querySelector(".konami-img");
      if(img)for(let b=0;b<3;b++)setTimeout(()=>particles(img),b*180);
    },350);
    setTimeout(()=>{if(ov.parentNode)close();},4200);
  }
})();

/* ── Load ── */
function applyData(d){
  C=d.cols||[];T=d.types||[];R=d.rows||[];ASOF=d.asof||"";
  IDX={};C.forEach((c,i)=>IDX[c]=i);
  PROP_N={};
  const pix=IDX["Property ID"];
  if(pix!==undefined)for(const r of R){const pid=r[pix];if(pid!==null&&pid!==undefined)PROP_N[pid]=(PROP_N[pid]||0)+1;}
  document.getElementById("asofVal").textContent=ASOF||"\u2014";
  page=0;
  recompute();
  document.getElementById("loading").style.display="none";
  document.getElementById("mainTable").style.display="table";
}

async function loadTiers(){
  try{
    const r=await fetch("rent_tiers.json?v="+Date.now(),{cache:"no-store"});
    if(r.ok){const d=await r.json();TIERS=d.contracts||{};}
  }catch(e){TIERS={};}
}
async function loadCoords(){
  try{
    const r=await fetch("property_coords.json?v="+Date.now(),{cache:"no-store"});
    if(r.ok){const d=await r.json();COORDS=d.coords||{};}
  }catch(e){COORDS={};}
}
(async function boot(){
  try{
    const tp=Promise.all([loadTiers(),loadCoords()]);
    const r=await fetch("hap_state.json?v="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();
    await tp;              /* have flags ready before first paint */
    applyData(d);
  }catch(e){
    document.getElementById("loading").innerHTML=
      `<p style="padding:20px;color:#888">Could not load the database (${e.message}). If this is a brand-new deployment, run the update workflow once from the Actions tab.</p>`;
  }
})();

/* ── Scroll bar ── */
(function(){
  const wrap  = document.querySelector('.table-wrap');
  const thumb = document.getElementById('scrollThumb');
  const track = document.getElementById('scrollTrack');
  const btnL  = document.getElementById('scrollLeft');
  const btnR  = document.getElementById('scrollRight');

  function update() {
    const sw = wrap.scrollWidth, cw = wrap.clientWidth;
    if (sw <= cw) { thumb.style.width = '100%'; thumb.style.left = '0'; return; }
    const ratio = cw / sw;
    const tw = Math.max(32, track.clientWidth * ratio);
    const maxScroll = sw - cw;
    const maxLeft   = track.clientWidth - tw;
    const leftPct   = (wrap.scrollLeft / maxScroll) * maxLeft;
    thumb.style.width = tw + 'px';
    thumb.style.left  = leftPct + 'px';
  }

  wrap.addEventListener('scroll', update);
  window.addEventListener('resize', update);
  setTimeout(update, 100);

  btnL.addEventListener('click', () => { wrap.scrollBy({ left: -300, behavior: 'smooth' }); });
  btnR.addEventListener('click', () => { wrap.scrollBy({ left:  300, behavior: 'smooth' }); });

  track.addEventListener('click', (e) => {
    if (e.target === thumb) return;
    const rect = track.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    wrap.scrollLeft = pct * (wrap.scrollWidth - wrap.clientWidth);
  });

  let dragging = false, startX = 0, startScroll = 0;
  thumb.addEventListener('mousedown', (e) => {
    dragging = true; startX = e.clientX; startScroll = wrap.scrollLeft;
    thumb.classList.add('dragging'); e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx       = e.clientX - startX;
    const trackW   = track.clientWidth;
    const thumbW   = thumb.offsetWidth;
    const maxLeft  = trackW - thumbW;
    const maxScroll= wrap.scrollWidth - wrap.clientWidth;
    wrap.scrollLeft = startScroll + (dx / maxLeft) * maxScroll;
  });
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; thumb.classList.remove('dragging'); }
  });

  const observer = new MutationObserver(() => setTimeout(update, 50));
  observer.observe(document.getElementById('tableBody'), { childList: true });
})();
</script>
